<!DOCTYPE html>
<!--
 * chat29.html V1.0.1 - 01/02/2026
 * Kitview Search - MODE CHAT uniquement
 * Basé sur web28.html avec toggle masqué et mode forcé
 -->
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitview Search</title>
    <link rel="icon" type="image/png" href="https://www.kitview.com/favicon.ico">
    <link rel="apple-touch-icon" href="https://www.kitview.com/favicon.ico">
    <link rel="stylesheet" href="css/chat29.css">
    
    <!-- Style inline pour le jaune stabilo (override CSS) -->
    <style>
        /*
 * web26.html V1.0.0 - 26/01/2026
 * FIX : Ajout .patient-card-chat au sélecteur reference-patient
 */
        .patient-card.reference-patient,
        .patient-card-chat.reference-patient,
        .patient-item.reference-patient {
            background: linear-gradient(135deg, #ffff00 0%, #ffeb3b 100%) !important;
            border: 3px solid #ffc107 !important;
            box-shadow: 0 4px 15px rgba(255, 235, 59, 0.5) !important;
        }
        
        /* Mode sombre : jaune légèrement atténué */
        [data-theme="dark"] .patient-card.reference-patient,
        [data-theme="dark"] .patient-card-chat.reference-patient,
        [data-theme="dark"] .patient-item.reference-patient {
            background: linear-gradient(135deg, #ffff00 0%, #fdd835 100%) !important;
            border: 3px solid #ffb300 !important;
        }
    </style>
</head>
<body>
    <!-- Header avec accessibilité -->
    <header class="header" role="banner">
        <div class="header-left header-left-with-toggle">
            <button class="icon-button" id="sidebarToggle" title="Masquer/Afficher la sidebar" aria-label="Ouvrir/fermer le menu" style="margin-right: 10px;">
                ☰
            </button>
            <img src="https://www.kitview.com/wp-content/uploads/2023/03/cropped-logo-kitview-1.png" alt="Logo Kitview" class="logo" id="logo">
            
            <!-- CHECKBOX TOGGLE v1.0.0 : Entre logo et Search -->
            <label class="search-toggle-container" title="Afficher/masquer la barre d'outils">
                <input type="checkbox" class="search-toggle-checkbox" id="searchToolbarToggle" aria-label="Afficher la barre d'outils">
                <span class="search-toggle-visual"></span>
            </label>
            
            <div class="title-container">
                <div class="title status-loading" id="searchTitle" role="status">Search</div>
                <div class="base-subtitle" id="baseSubtitle"></div>
                <div class="version-subtitle" id="versionSubtitle">V1.0.0</div>
            </div>
            
            <!-- BOUTON AIDE v1.0.0 : Ouvre le mode d'emploi -->
            <button class="help-button" id="helpButton" title="Mode d'emploi" onclick="window.open('modedemploi.html', '_blank')">?</button>
        </div>
        
        <!-- TOOLBAR v1.0.0 : Container masquable pour header-center et header-right -->
        <div class="header-toolbar hidden" id="headerToolbar">
        <div class="header-center">
            <select class="base-selector" id="baseSelector" aria-label="Sélectionner une base de données">
                <option value="">Chargement...</option>
            </select>
            
            <!-- LABEL LANGUE (masqué) -->
            <div class="patient-lang-label" id="patientLangLabel" style="display: none;">
                <span class="lang-word" id="langWord"></span>
                <img class="lang-flag" id="langFlagSmall" src="" alt="">
            </div>
            
            <!-- BOUTON LANGUE + POPUP CHIPS (V2.0 simplifié) -->
            <div class="lang-button-container">
                <button class="lang-button" id="langButton" title="Langue de la question" aria-label="Changer la langue" aria-haspopup="true">
                    <img class="flag-img" id="langFlag" src="" alt="Drapeau langue">
                    <span class="lang-text" id="langText">FR</span>
                    <span class="dropdown-arrow" aria-hidden="true">▼</span>
                </button>
                
                <!-- POPUP SIMPLIFIÉE V2.0 : Plus de section réponse, plus de footer -->
                <div class="lang-popup" id="langPopup" style="display: none;" role="dialog" aria-label="Sélection de langue">
                    <div class="lang-popup-header">
                        <span>🌐</span> Langue de la question
                    </div>
                    
                    <!-- Chips de langue - Clic direct = changement immédiat -->
                    <div class="lang-popup-section">
                        <div class="chips-container" id="chipsContainer">
                            <!-- Généré par JS -->
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- CHECKBOX FR V2.0 : Force la réponse en français -->
            <div class="response-fr-container">
                <label class="response-fr-label" title="Forcer les résultats en français">
                    <input type="checkbox" class="response-fr-checkbox" id="responseFrCheckbox" checked>
                    <span class="response-fr-text">→fr</span>
                </label>
            </div>
            
            <!-- Mode SC (masqué) -->
            <select class="base-selector" id="searchModeSelector" title="Mode de recherche backend" style="display: none;">
                <option value="sc" selected>SC</option>
            </select>
            
            <!-- MODE DE DÉTECTION -->
            <div class="detection-mode-controls" id="detectionModeControls">
                <select class="base-selector" id="detectionModeSelector" title="Mode de détection" disabled>
                    <option value="">⏳ Chargement...</option>
                </select>
            </div>
        </div>
        
        <div class="header-right">
            <!-- MODE DÉMO -->
            <div class="demo-switch" id="demoSwitchContainer">
                <span class="demo-label">Démo</span>
                <label class="switch">
                    <input type="checkbox" id="demoToggle">
                    <span class="slider"></span>
                </label>
                <div class="demo-progress-ring" id="demoProgressRing" style="--progress: 0;" title="Progression du cycle"></div>
            </div>
            
            <!-- BOUTON ANALYSE -->
            <button class="icon-button" id="analyseButton" title="Analyse des logs" onclick="window.location.href='webanalyse.html'" style="display: none;">
                📊
            </button>
            
            <button class="icon-button" id="themeToggle" title="Changer le thème">
                🌙
            </button>
            
            <button class="icon-button" id="settingsButton" title="Paramètres">
                ⚙️
            </button>
        </div>
        </div>
    </header>

    <!-- Container principal -->
    <div class="main-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-resize-handle" id="sidebarResizeHandle"></div>
            
            <div style="padding: 20px;">
                <button class="new-search-btn" id="newSearchBtn">
                    ✨ Nouvelle recherche
                </button>
            </div>
            
            <div class="sidebar-section">
                <div class="sidebar-title">Conversations récentes</div>
                <div id="recentConversations"></div>
            </div>
            
            <div class="sidebar-section">
                <div class="sidebar-title">Exemples</div>
                <div id="examplesList"></div>
            </div>
            
            <div id="versionDisplay" style="padding: 16px; margin-top: auto; border-top: 1px solid var(--border-color); font-size: 12px; color: var(--text-secondary); text-align: left;">
                F1.0.0/S...
            </div>
        </div>

        <!-- Zone de contenu -->
        <div class="content">
            <!-- Zone de bienvenue (initial) -->
            <div class="welcome-container" id="welcomeContainer">
                <div class="filigrane-ghost" id="filigraneGhost"></div>
                
                <div class="welcome-message">
                    Bienvenue <span class="user-name" id="welcomeUserName"></span> 👋
                </div>
                
                <div class="search-container-center">
                    <div class="search-box" role="search">
                        <input 
                            type="search" 
                            class="search-input" 
                            id="searchInputCenter"
                            placeholder="Rechercher un patient (ex: béance, classe 2, diabète...)"
                            autocomplete="off"
                            aria-label="Rechercher un patient"
                            list="searchSuggestions"
                        >
                        <button class="voice-btn" id="voiceBtnCenter" title="Recherche vocale" aria-label="Activer la recherche vocale">
                            🎤
                        </button>
                        <button class="search-button" id="searchButtonCenter" disabled title="Saisir du texte pour rechercher" aria-label="Lancer la recherche">
                            ⬆️
                        </button>
                    </div>
                </div>
            </div>
            
            <datalist id="searchSuggestions"></datalist>

            <!-- Zone de recherche en haut (mode Classique) -->
            <div class="search-container-top" id="searchContainerTop">
                <div class="search-box" role="search">
                    <input 
                        type="search" 
                        class="search-input" 
                        id="searchInputTop"
                        placeholder="Rechercher un patient..."
                        autocomplete="off"
                        aria-label="Rechercher un patient"
                        list="searchSuggestions"
                    >
                    <button class="voice-btn" id="voiceBtnTop" title="Recherche vocale" aria-label="Activer la recherche vocale">
                        🎤
                    </button>
                    <button class="search-button" id="searchButtonTop" disabled title="Saisir du texte pour rechercher" aria-label="Lancer la recherche">
                        ⬆️
                    </button>
                </div>
            </div>

            <!-- Zone de résultats -->
            <main class="results-container" id="resultsContainer" role="main" aria-live="polite" aria-label="Résultats de recherche">
            </main>

            <!-- Loading -->
            <div class="loading" id="loading" role="status" aria-live="assertive">
                <div class="bandeau-loading" id="bandeauLoading">
                    <div class="illustration" id="loadingIllustration"></div>
                    <div class="bandeau-content">
                        <div class="message-principal" id="loadingMessagePrincipal">
                            <span class="loading-spinner-inline" aria-hidden="true"></span>
                            <span id="loadingText">Recherche en cours...</span>
                        </div>
                        <div class="message-secondaire" id="loadingQuery"></div>
                        <div class="message-tertiaire" id="loadingMeta"></div>
                    </div>
                </div>
            </div>

            <!-- Zone de recherche en bas (mode IA) -->
            <div class="search-container-bottom" id="searchContainerBottom">
                <div class="search-box" role="search">
                    <input 
                        type="search" 
                        class="search-input" 
                        id="searchInputBottom"
                        placeholder="Poser une autre question..."
                        autocomplete="off"
                        aria-label="Poser une question"
                        list="searchSuggestions"
                    >
                    <button class="voice-btn" id="voiceBtnBottom" title="Recherche vocale" aria-label="Activer la recherche vocale">
                        🎤
                    </button>
                    <button class="search-button" id="searchButtonBottom" disabled title="Saisir du texte pour rechercher" aria-label="Lancer la recherche">
                        ⬆️
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ═══════════════════════════════════════════════════════════════════
         SCRIPTS EXTERNES - Ordre important !
         1. utils.js : Utilitaires (debounce, addDebugLog, DEBUG)
         2. voice.js : Reconnaissance vocale
         3. illustrations.js : Gestion images et filigrane  
         4. search.js : Module recherche API (bases, moteurs IA, searchPatients)
         5. i18n.js : Internationalisation (V2.0 - clic direct, checkbox fr)
         6. meme.js : Logique "même que" (critères, clics, recherche)
         7. main.js : Code principal (filigrane, thème, démo, rendu)
         ═══════════════════════════════════════════════════════════════════ -->
    <script src="js/utils.js"></script>
    <script src="js/voice.js"></script>
    <script src="js/illustrations.js"></script>
    <script src="js/search.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/meme.js"></script>
    <script src="js/main_chat.js"></script>
</body>
</html>
