/*

/* ═══════════════════════════════════════════════════════════════════════
   UTILITAIRES GLOBAUX
   ═══════════════════════════════════════════════════════════════════════ */

/**
 * Debounce : retarde l'exécution d'une fonction jusqu'à ce que
 * l'utilisateur arrête d'interagir pendant 'wait' millisecondes
 * @param {Function} func - Fonction à debouncer
 * @param {number} wait - Délai en ms (défaut: 300)
 * @returns {Function} - Fonction debouncée
 */
function debounce(func, wait = 300) {
    let timeout;
    return function executedFunction(...args) {
        clearTimeout(timeout);
        timeout = setTimeout(() => func.apply(this, args), wait);
    };
}

/* ═══════════════════════════════════════════════════════════════════════
   VOICE SEARCH v2.0.0 - Module de recherche vocale + Mode mains libres
   Utilise Web Speech API (SpeechRecognition)
   Compatible: Chrome, Edge, Safari
   
   v2.0.0 - Mode mains libres :
   - Mot-clé "kitview" pour déclencher la recherche
   - Durée paramétrable (localStorage: handsfreeDuration, en minutes)
   - Cercle progressif qui se remplit
   - Raccourci clavier Ctrl+Shift+M
   ═══════════════════════════════════════════════════════════════════════ */

const voiceSearchManager = (function() {
    
    // Vérification de la compatibilité
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const isSupported = !!SpeechRecognition;
    
    // Configuration
    const KEYWORD = 'kitview';  // Mot-clé déclencheur
    const SILENCE_TIMEOUT = 5000;  // 5 secondes de silence avant lancement auto (mode normal)
    
    // État interne
    let recognition = null;
    let isListening = false;
    let isHandsfreeMode = false;
    let currentInputId = null;
    let currentButtonId = null;
    let silenceTimer = null;
    let handsfreeTimer = null;
    let handsfreeStartTime = null;
    let progressInterval = null;
    let hasReceivedSpeech = false;
    let buttonConfigs = [];
    let accumulatedTranscript = '';  // Pour accumuler le texte en mode mains libres
    
    // Mapping langue sélectionnée → code BCP-47 pour SpeechRecognition
    const LANG_CODES = {
        'fr': 'fr-FR',
        'en': 'en-US',
        'de': 'de-DE',
        'es': 'es-ES',
        'it': 'it-IT',
        'pt': 'pt-PT',
        'pl': 'pl-PL',
        'ro': 'ro-RO',
        'th': 'th-TH',
        'ar': 'ar-SA',
        'cn': 'zh-CN',
        'ja': 'ja-JP',
        'auto': 'fr-FR'
    };
    
    /**
     * Récupère la durée du mode mains libres depuis localStorage (en minutes)
     */
    function getHandsfreeDuration() {
        const minutes = parseInt(localStorage.getItem('handsfreeDuration') || '5');
        return Math.max(1, Math.min(10, minutes)) * 60 * 1000;  // Convertir en ms
    }
    
    /**
     * Crée le SVG du cercle progressif
     */
    function createProgressRing() {
        const size = 40;
        const strokeWidth = 3;
        const radius = (size - strokeWidth) / 2;
        const circumference = 2 * Math.PI * radius;
        
        const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        svg.setAttribute('class', 'progress-ring');
        svg.setAttribute('viewBox', `0 0 ${size} ${size}`);
        
        // Cercle de fond
        const bgCircle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        bgCircle.setAttribute('class', 'bg');
        bgCircle.setAttribute('cx', size / 2);
        bgCircle.setAttribute('cy', size / 2);
        bgCircle.setAttribute('r', radius);
        svg.appendChild(bgCircle);
        
        // Cercle de progression
        const progressCircle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        progressCircle.setAttribute('class', 'progress');
        progressCircle.setAttribute('cx', size / 2);
        progressCircle.setAttribute('cy', size / 2);
        progressCircle.setAttribute('r', radius);
        progressCircle.setAttribute('stroke-dasharray', circumference);
        progressCircle.setAttribute('stroke-dashoffset', circumference);
        svg.appendChild(progressCircle);
        
        return { svg, circumference, progressCircle };
    }
    
    /**
     * Met à jour la progression du cercle
     */
    function updateProgress(button, progress) {
        const progressCircle = button.querySelector('.progress-ring .progress');
        if (progressCircle) {
            const circumference = parseFloat(progressCircle.getAttribute('stroke-dasharray'));
            const offset = circumference * (1 - progress);
            progressCircle.setAttribute('stroke-dashoffset', offset);
        }
    }
    
    /**
     * Réinitialise le timer de silence (mode normal)
     */
    function resetSilenceTimer() {
        if (silenceTimer) clearTimeout(silenceTimer);
        
        if (!isHandsfreeMode) {
            silenceTimer = setTimeout(() => {
                if (isListening && hasReceivedSpeech && !isHandsfreeMode) {
                    console.log('[VoiceSearch] Timeout silence - Lancement recherche');
                    launchSearchAndStop();
                }
            }, SILENCE_TIMEOUT);
        }
    }
    
    /**
     * Démarre le timer et la progression du mode mains libres
     */
    function startHandsfreeTimer(button) {
        const duration = getHandsfreeDuration();
        handsfreeStartTime = Date.now();
        
        // Timer de fin
        handsfreeTimer = setTimeout(() => {
            console.log('[VoiceSearch] Fin du mode mains libres (timeout)');
            stopListening();
        }, duration);
        
        // Mise à jour de la progression toutes les 100ms
        progressInterval = setInterval(() => {
            const elapsed = Date.now() - handsfreeStartTime;
            const progress = Math.min(elapsed / duration, 1);
            updateProgress(button, progress);
            
            if (progress >= 1) {
                clearInterval(progressInterval);
            }
        }, 100);
    }
    
    /**
     * Lance la recherche et arrête l'écoute
     */
    function launchSearchAndStop() {
        const inputId = currentInputId;
        const query = accumulatedTranscript.trim();
        
        stopListening();
        
        if (query && inputId) {
            setTimeout(() => {
                const input = document.getElementById(inputId);
                if (input) {
                    input.value = query;
                    input.dispatchEvent(new Event('input', { bubbles: true }));
                }
                
                const buttonId = inputId.replace('Input', 'Button');
                const button = document.getElementById(buttonId);
                if (button && !button.disabled) {
                    button.click();
                }
            }, 300);
        }
    }
    
    /**
     * Traite le transcript pour détecter le mot-clé "kitview"
     */
    function processTranscript(transcript) {
        const lower = transcript.toLowerCase();
        
        // Chercher le mot-clé "kitview" (ou variantes phonétiques)
        const keywordVariants = ['kitview', 'kit view', 'kitvue', 'kit vue', 'quitte view', 'quitte vue'];
        
        for (const variant of keywordVariants) {
            const index = lower.indexOf(variant);
            if (index !== -1) {
                // Extraire la requête après le mot-clé
                const afterKeyword = transcript.substring(index + variant.length).trim();
                if (afterKeyword.length > 0) {
                    console.log('[VoiceSearch] Mot-clé détecté, requête:', afterKeyword);
                    return { found: true, query: afterKeyword };
                }
            }
        }
        
        return { found: false, query: transcript };
    }
    
    /**
     * Initialise le moteur de reconnaissance vocale
     */
    function initRecognition() {
        if (!isSupported || recognition) return;
        
        recognition = new SpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.maxAlternatives = 1;
        
        recognition.onresult = (event) => {
            let finalTranscript = '';
            let interimTranscript = '';
            
            for (let i = event.resultIndex; i < event.results.length; i++) {
                const result = event.results[i];
                if (result.isFinal) {
                    finalTranscript += result[0].transcript;
                } else {
                    interimTranscript += result[0].transcript;
                }
            }
            
            hasReceivedSpeech = true;
            
            // Afficher le transcript en cours dans l'input
            const input = document.getElementById(currentInputId);
            if (input) {
                if (isHandsfreeMode) {
                    // En mode mains libres, afficher tout ce qui est dit
                    input.value = accumulatedTranscript + interimTranscript;
                } else {
                    input.value = interimTranscript || finalTranscript;
                }
                input.dispatchEvent(new Event('input', { bubbles: true }));
            }
            
            if (finalTranscript) {
                if (isHandsfreeMode) {
                    // Mode mains libres : chercher le mot-clé
                    const { found, query } = processTranscript(finalTranscript);
                    if (found && query) {
                        accumulatedTranscript = query;
                        launchSearchAndStop();
                    } else {
                        // Accumuler mais ne pas lancer
                        accumulatedTranscript += ' ' + finalTranscript;
                    }
                } else {
                    // Mode normal : réinitialiser le timer de silence
                    accumulatedTranscript = finalTranscript;
                    resetSilenceTimer();
                }
            }
        };
        
        recognition.onend = () => {
            console.log('[VoiceSearch] Écoute terminée par l\'API');
            
            if (isHandsfreeMode && isListening) {
                // En mode mains libres, redémarrer automatiquement
                try {
                    recognition.start();
                    console.log('[VoiceSearch] Redémarrage auto (mode mains libres)');
                } catch (e) {
                    console.error('[VoiceSearch] Erreur redémarrage:', e);
                    stopListening();
                }
            } else if (isListening && hasReceivedSpeech && !isHandsfreeMode) {
                launchSearchAndStop();
            } else {
                stopListening();
            }
        };
        
        recognition.onerror = (event) => {
            console.error('[VoiceSearch] Erreur:', event.error);
            
            if (event.error === 'no-speech') {
                if (isHandsfreeMode) {
                    // En mode mains libres, ignorer l'erreur no-speech
                    return;
                }
                console.log('[VoiceSearch] Aucune parole détectée');
            } else if (event.error === 'not-allowed') {
                alert('L\'accès au microphone a été refusé. Veuillez autoriser l\'accès dans les paramètres de votre navigateur.');
                stopListening();
            } else if (event.error === 'network') {
                alert('Erreur réseau. La reconnaissance vocale nécessite une connexion Internet.');
                stopListening();
            }
        };
        
        console.log('[VoiceSearch] Moteur initialisé');
    }
    
    /**
     * Démarre l'écoute
     * @param {string} inputId - ID de l'input
     * @param {string} buttonId - ID du bouton
     * @param {boolean} handsfree - Mode mains libres
     */
    function startListening(inputId, buttonId, handsfree = false) {
        if (!isSupported) return;
        
        if (isListening) {
            stopListening();
            if (currentButtonId === buttonId && !handsfree) {
                return;  // Toggle off
            }
        }
        
        initRecognition();
        
        currentInputId = inputId;
        currentButtonId = buttonId;
        isHandsfreeMode = handsfree;
        hasReceivedSpeech = false;
        accumulatedTranscript = '';
        
        const lang = typeof selectedLanguage !== 'undefined' ? selectedLanguage : 'fr';
        recognition.lang = LANG_CODES[lang] || LANG_CODES['fr'];
        console.log('[VoiceSearch] Langue:', recognition.lang, '| Mode:', handsfree ? 'mains libres' : 'normal');
        
        try {
            recognition.start();
            isListening = true;
            
            const button = document.getElementById(buttonId);
            if (button) {
                if (handsfree) {
                    button.classList.add('handsfree');
                    button.classList.remove('listening');
                    
                    // Ajouter le cercle progressif s'il n'existe pas
                    if (!button.querySelector('.progress-ring')) {
                        const { svg } = createProgressRing();
                        button.appendChild(svg);
                    }
                    
                    // Démarrer le timer
                    startHandsfreeTimer(button);
                    
                    const minutes = parseInt(localStorage.getItem('handsfreeDuration') || '5');
                    button.title = `Mode mains libres (${minutes}min) - Dites "Kitview" suivi de votre recherche`;
                } else {
                    button.classList.add('listening');
                    button.classList.remove('handsfree');
                    button.title = 'Cliquez pour arrêter (ou Ctrl+Shift+M)';
                }
            }
            
            console.log('[VoiceSearch] Écoute démarrée');
        } catch (error) {
            console.error('[VoiceSearch] Erreur démarrage:', error);
            stopListening();
        }
    }
    
    /**
     * Arrête l'écoute
     */
    function stopListening() {
        if (silenceTimer) clearTimeout(silenceTimer);
        if (handsfreeTimer) clearTimeout(handsfreeTimer);
        if (progressInterval) clearInterval(progressInterval);
        
        silenceTimer = null;
        handsfreeTimer = null;
        progressInterval = null;
        handsfreeStartTime = null;
        
        if (recognition && isListening) {
            try {
                recognition.stop();
            } catch (e) {}
        }
        
        isListening = false;
        const wasHandsfree = isHandsfreeMode;
        isHandsfreeMode = false;
        hasReceivedSpeech = false;
        
        if (currentButtonId) {
            const button = document.getElementById(currentButtonId);
            if (button) {
                button.classList.remove('listening', 'handsfree');
                button.title = 'Recherche vocale (Ctrl+Shift+M) | Clic long = mode mains libres';
                
                // Réinitialiser le cercle
                updateProgress(button, 0);
            }
        }
        
        currentInputId = null;
        currentButtonId = null;
        accumulatedTranscript = '';
    }
    
    /**
     * Toggle écoute (clic court = normal, clic long = mains libres)
     */
    function toggleListening(inputId, buttonId) {
        if (isListening && currentButtonId === buttonId) {
            stopListening();
        } else {
            startListening(inputId, buttonId, false);
        }
    }
    
    /**
     * Détermine l'input actif pour le raccourci clavier
     */
    function getActiveConfig() {
        const welcomeContainer = document.getElementById('welcomeContainer');
        if (welcomeContainer && welcomeContainer.style.display !== 'none') {
            return buttonConfigs.find(c => c.inputId === 'searchInputCenter');
        }
        
        const searchBottom = document.getElementById('searchContainerBottom');
        if (searchBottom && searchBottom.classList.contains('active')) {
            return buttonConfigs.find(c => c.inputId === 'searchInputBottom');
        }
        
        const searchTop = document.getElementById('searchContainerTop');
        if (searchTop && searchTop.classList.contains('active')) {
            return buttonConfigs.find(c => c.inputId === 'searchInputTop');
        }
        
        return buttonConfigs[0];
    }
    
    /**
     * Initialise les boutons micro
     */
    function initButtons(configs) {
        buttonConfigs = configs;
        
        if (!isSupported) {
            configs.forEach(config => {
                const button = document.getElementById(config.buttonId);
                if (button) {
                    button.classList.add('unsupported');
                }
            });
            console.log('[VoiceSearch] API non supportée - boutons masqués');
            return;
        }
        
        configs.forEach(config => {
            const button = document.getElementById(config.buttonId);
            if (button) {
                let pressTimer = null;
                let longPressTriggered = false;
                
                // Gestion du clic long pour mode mains libres
                button.addEventListener('mousedown', (e) => {
                    e.preventDefault();
                    longPressTriggered = false;
                    pressTimer = setTimeout(() => {
                        longPressTriggered = true;
                        startListening(config.inputId, config.buttonId, true);  // Mode mains libres
                    }, 500);  // 500ms pour déclencher le mode mains libres
                });
                
                button.addEventListener('mouseup', (e) => {
                    e.preventDefault();
                    clearTimeout(pressTimer);
                    if (!longPressTriggered) {
                        toggleListening(config.inputId, config.buttonId);
                    }
                });
                
                button.addEventListener('mouseleave', () => {
                    clearTimeout(pressTimer);
                });
                
                // Support tactile
                button.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    longPressTriggered = false;
                    pressTimer = setTimeout(() => {
                        longPressTriggered = true;
                        startListening(config.inputId, config.buttonId, true);
                    }, 500);
                });
                
                button.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    clearTimeout(pressTimer);
                    if (!longPressTriggered) {
                        toggleListening(config.inputId, config.buttonId);
                    }
                });
                
                button.title = 'Recherche vocale (Ctrl+Shift+M) | Clic long = mode mains libres';
            }
        });
        
        // Raccourci clavier Ctrl+Shift+M
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === 'm') {
                e.preventDefault();
                
                if (isListening) {
                    stopListening();
                } else {
                    const config = getActiveConfig();
                    if (config) {
                        // Shift+Ctrl+M = mode normal, Alt+Shift+Ctrl+M = mode mains libres
                        startListening(config.inputId, config.buttonId, e.altKey);
                    }
                }
            }
        });
        
        console.log('[VoiceSearch v2.0.0] Boutons initialisés:', configs.length, '| Mot-clé:', KEYWORD);
    }
    
    return {
        isSupported,
        initButtons,
        startListening,
        stopListening,
        toggleListening,
        isListening: () => isListening,
        isHandsfreeMode: () => isHandsfreeMode,
        getActiveConfig,
        KEYWORD
    };
})();


/* ═══════════════════════════════════════════════════════════════════════

const illustrationsManager = (function() {
    
    // État interne
    let illustrations = { medical: [], search: [], zero: [] };
    let piles = { result: [], zero: [] };
    let initialized = false;
    
    // Mélange Fisher-Yates
    function shuffle(array) {
        const result = [...array];
        for (let i = result.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [result[i], result[j]] = [result[j], result[i]];
        }
        return result;
    }
    
    // Recharge une pile
    function rechargerPile(type) {
        if (type === 'result') {
            piles.result = shuffle([...illustrations.medical, ...illustrations.search]);
        } else if (type === 'zero') {
            piles.zero = shuffle([...illustrations.zero]);
        }
    }
    
    // Tire une image
    function tirerImage(type) {
        if (piles[type].length === 0) rechargerPile(type);
        if (piles[type].length === 0) return null;
        return piles[type].pop();
    }
    
    return {
        async init(apiBaseUrl) {
            const baseUrl = apiBaseUrl || window.API_BASE_URL || 'http://localhost:8000';
            try {
                console.log('[Illustrations] Chargement depuis', baseUrl + '/illustrations');
                const response = await fetch(baseUrl + '/illustrations');
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                
                illustrations.medical = data.medical || [];
                illustrations.search = data.search || [];
                illustrations.zero = data.zero || [];
                
                rechargerPile('result');
                rechargerPile('zero');
                initialized = true;
                
                const total = illustrations.medical.length + illustrations.search.length + illustrations.zero.length;
                console.log(`[Illustrations] Chargées: ${total} images (medical:${illustrations.medical.length}, search:${illustrations.search.length}, zero:${illustrations.zero.length})`);
                return true;
            } catch (error) {
                console.warn('[Illustrations] Erreur de chargement:', error.message);
                initialized = false;
                return false;
            }
        },
        
        isInitialized() { return initialized; },
        hasImages() { return illustrations.medical.length + illustrations.search.length > 0; },
        
        getResultImage() { return tirerImage('result'); },
        getZeroImage() { return tirerImage('zero'); },

        },
        
        // v1.3.0 : Retourne l'URL de l'image d'un moteur IA

        getMoteurImage(moteur) {

/**
 * Applique l'intensité du filigrane (0-100)
 * 0% = fantomatique (opacity très faible)
 * 100% = image grayscale visible
 */
function applyFiligraneIntensity(intensity) {
    const filigraneEl = document.getElementById('filigraneGhost');
    if (!filigraneEl) return;
    
    // Déterminer si on est en mode sombre
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    
    // Calculer les valeurs interpolées
    // Mode clair : opacity de 0.04 (0%) à 0.7 (100%)
    // Mode sombre : opacity de 0.08 (0%) à 0.75 (100%)
    const minOpacity = isDark ? 0.08 : 0.04;
    const maxOpacity = isDark ? 0.75 : 0.7;
    const opacity = minOpacity + (maxOpacity - minOpacity) * (intensity / 100);
    
    // Contrast diminue de 1.2/1.5 vers 1.0 quand intensity augmente
    const minContrast = isDark ? 1.5 : 1.2;
    const contrast = minContrast - (minContrast - 1.0) * (intensity / 100);
    
    // Brightness (sombre uniquement) : de 0.5 vers 1.0
    const brightness = isDark ? (0.5 + 0.5 * (intensity / 100)) : 1.0;
    
    // Appliquer les styles
    filigraneEl.style.opacity = opacity;
    filigraneEl.style.filter = isDark 
        ? `grayscale(100%) brightness(${brightness}) contrast(${contrast})`
        : `grayscale(100%) contrast(${contrast})`;
    
    console.log(`[Filigrane] Intensité ${intensity}% - opacity: ${opacity.toFixed(2)}, contrast: ${contrast.toFixed(2)}${isDark ? ', brightness: ' + brightness.toFixed(2) : ''}`);
}

/**
 * Détecte la langue d'un texte en se basant sur les caractères Unicode
 * v1.3.2 : Détection simple côté client pour le bandeau loading
 * @param {string} text - Le texte à analyser
 * @returns {string} Code langue détecté (fr, ja, zh, ar, th, etc.)
 */
function detectLanguageFromText(text) {
    if (!text) return 'fr';
    
    // Compteur de caractères par script
    let japanese = 0;  // Hiragana, Katakana, Kanji
    let chinese = 0;   // Han uniquement (sans kana)
    let arabic = 0;
    let thai = 0;
    let cyrillic = 0;
    let latin = 0;
    
    for (const char of text) {
        const code = char.charCodeAt(0);
        
        // Hiragana (3040-309F), Katakana (30A0-30FF)
        if ((code >= 0x3040 && code <= 0x309F) || (code >= 0x30A0 && code <= 0x30FF)) {
            japanese++;
        }
        // CJK Unified Ideographs (4E00-9FFF) - Kanji/Hanzi
        else if (code >= 0x4E00 && code <= 0x9FFF) {
            japanese++; // Priorité japonais si mélangé avec kana
            chinese++;
        }
        // Arabic (0600-06FF)
        else if (code >= 0x0600 && code <= 0x06FF) {
            arabic++;
        }
        // Thai (0E00-0E7F)
        else if (code >= 0x0E00 && code <= 0x0E7F) {
            thai++;
        }
        // Cyrillic (0400-04FF)
        else if (code >= 0x0400 && code <= 0x04FF) {
            cyrillic++;
        }
        // Latin de base + étendu
        else if ((code >= 0x0041 && code <= 0x007A) || (code >= 0x00C0 && code <= 0x017F)) {
            latin++;
        }
    }
    
    // Déterminer la langue dominante
    const max = Math.max(japanese, chinese, arabic, thai, cyrillic, latin);
    
    if (max === 0) return 'fr';  // Défaut si aucun caractère reconnu
    
    if (japanese > 0 && japanese >= chinese) return 'ja';  // Japonais si kana présents
    if (chinese > japanese) return 'cn';
    if (arabic === max) return 'ar';
    if (thai === max) return 'th';
    if (cyrillic === max) return 'ru';
    
    return 'fr';  // Défaut pour latin
}

/**

 * Utilisé lors de l'affichage des résultats (bandeau ou liste)
 */
function hideFiligraneForResults() {

        clearInterval(window.filigraneAnimationTimer);
        window.filigraneAnimationTimer = null;
    }
    applyFiligraneIntensity(0);
    console.log('[Filigrane] Intensité minimale pour affichage résultats');
}

/**
 * Restaure le filigrane à sa valeur configurée (sans animation)
 */
function restoreFiligraneIntensity() {
    // Arrêter toute animation en cours
    if (window.filigraneAnimationTimer) {
        clearInterval(window.filigraneAnimationTimer);
        window.filigraneAnimationTimer = null;
    }
    applyFiligraneIntensity(filigraneIntensity);
    console.log('[Filigrane] Restauré à', filigraneIntensity + '%');
}

/**
 * Animation : part de 100% et descend vers la valeur de consigne en 10 secondes
 * Utilisé lors de "Nouvelle recherche"
 */
function animateFiligraneFromMax() {
    // Arrêter toute animation en cours
    if (window.filigraneAnimationTimer) {
        clearInterval(window.filigraneAnimationTimer);
        window.filigraneAnimationTimer = null;
    }
    
    const startIntensity = 100;
    const targetIntensity = filigraneIntensity;
    const duration = 10000; // 10 secondes
    const startTime = Date.now();
    
    // Appliquer immédiatement l'intensité maximale
    applyFiligraneIntensity(startIntensity);
    console.log('[Filigrane] Animation: 100% →', targetIntensity + '% en 10s');
    
    window.filigraneAnimationTimer = setInterval(() => {
        const elapsed = Date.now() - startTime;
        const progress = Math.min(elapsed / duration, 1);
        
        // Interpolation linéaire de 100% vers la valeur de consigne
        const currentIntensity = startIntensity - (startIntensity - targetIntensity) * progress;
        applyFiligraneIntensity(currentIntensity);
        
        if (progress >= 1) {
            clearInterval(window.filigraneAnimationTimer);
            window.filigraneAnimationTimer = null;
            console.log('[Filigrane] Animation terminée à', targetIntensity + '%');
        }
    }, 50); // 20 fps
}

 */
function runDemoCycleB() {
    if (!demoMode) return;
    
    demoPhase = 'typing';
    console.log('[Démo] Cycle B: Affichage exemple');
    
    // Récupérer les exemples
    const examplesText = elements.examplesTextarea ? elements.examplesTextarea.value : '';

        examples.push(...DEFAULT_EXAMPLES);
    }
    
    // Choisir un exemple au hasard

    const chosenExample = examples[randomIndex];
    
    addDebugLog(`Démo: Exemple "${chosenExample.substring(0, 30)}..."`, 'info');

    const activeInput = getActiveSearchInput();
    const query = activeInput ? activeInput.value : '';
    
    if (query) {
        addDebugLog(`Démo: Recherche "${query.substring(0, 30)}..."`, 'info');
        searchPatients(query);
    }
    
    // Attendre 7t/10 secondes puis décider du prochain cycle
    const waitTime = (7 * demoDuration / 10) * 1000;
    startDemoProgressAnimation(30, 100, waitTime);
    
    demoTimers.phase = setTimeout(() => {
        decideNextDemoCycle();
    }, waitTime);

/**
 * Décide du prochain cycle: 2/3 → B, 1/3 → A
 */
function decideNextDemoCycle() {
    if (!demoMode) return;
    
    const random = Math.random();
    
    if (random < 0.33) {
        // 1/3: Retour en A (nouvelle recherche complète)
        console.log('[Démo] Décision: Retour en A (nouvelle recherche)');
        addDebugLog('Démo: Nouveau cycle complet', 'info');
        runDemoCycleA();
    } else {
        // 2/3: Retour en B (juste effacer et nouvel exemple)
        console.log('[Démo] Décision: Retour en B (nouvel exemple)');
        addDebugLog('Démo: Nouvel exemple', 'info');
        
        // Effacer la zone de recherche sans faire "nouvelle recherche"
        const activeInput = getActiveSearchInput();
        if (activeInput) {
            activeInput.value = '';
            activeInput.dispatchEvent(new Event('input', { bubbles: true }));
        }
        
        // Restaurer le filigrane car on commence une nouvelle saisie
        restoreFiligraneIntensity();
        
        runDemoCycleB();
    }
}

/**
 * Anime la progression du disque
 */
function startDemoProgressAnimation(startPercent, endPercent, duration) {
    if (demoTimers.progress) {
        clearInterval(demoTimers.progress);
    }
    
    const startTime = Date.now();
    updateDemoProgress(startPercent);
    
    demoTimers.progress = setInterval(() => {
        const elapsed = Date.now() - startTime;
        const progress = Math.min(elapsed / duration, 1);
        const currentPercent = startPercent + (endPercent - startPercent) * progress;
        updateDemoProgress(currentPercent);
        
        if (progress >= 1) {
            clearInterval(demoTimers.progress);
            demoTimers.progress = null;
        }
    }, 50);
}

/**
 * Retourne l'input de recherche actif selon le mode
 */
function getActiveSearchInput() {
    if (elements.welcomeContainer && elements.welcomeContainer.style.display !== 'none') {
        return elements.searchInputCenter;
    } else if (currentMode === 'classique') {
        return elements.searchInputTop;
    } else {
        return elements.searchInputBottom;
    }
}

        /**
         * Retourne le texte traduit pour une clé donnée
         * @param {string} cle - Clé française du texte
         * @param {string} lang - Langue cible (optionnel, utilise currentUILang par défaut)
         * @returns {string} Texte traduit ou clé française en fallback
         */
        function t(cle, lang = null) {
            if (!cle) return cle;
            
            const targetLang = lang || currentUILang || 'fr';
            
            // Recherche exacte d'abord
            if (I18N_CACHE[cle]) {
                return I18N_CACHE[cle][targetLang] || I18N_CACHE[cle]['fr'] || cle;
            }
            
            // Recherche insensible à la casse
            const cleLower = cle.toLowerCase().trim();
            if (I18N_CACHE_LOWER[cleLower]) {
                return I18N_CACHE_LOWER[cleLower][targetLang] || I18N_CACHE_LOWER[cleLower]['fr'] || cle;
            }
            
            // Fallback: retourner la clé telle quelle
            return cle;
        }
        
        /**
         * Traduit une pathologie composée (ex: "Bruxisme Nocturne Sévère") 
         * Les pathologies sont des combinaisons tag + adjectifs.
         * Utilise un algorithme glouton pour trouver les plus longues correspondances.
         * Ex: "Dentition Permanente" = tag composé (2 mots) → traduit en bloc
         * Ex: "Bruxisme Nocturne Sévère" = tag + 2 adjectifs → traduits séparément
         * @param {string} pathologie - Pathologie complète en français
         * @param {string} lang - Langue cible (optionnel)
         * @returns {string} Pathologie traduite
         */
        function tPatho(pathologie, lang = null) {
            if (!pathologie) return pathologie;
            
            const targetLang = lang || currentUILang || 'fr';
            
            // Si langue française, pas besoin de traduire
            if (targetLang === 'fr') return pathologie;
            
            // Essayer d'abord de traduire l'expression complète
            const completeLower = pathologie.toLowerCase().trim();
            if (I18N_CACHE_LOWER[completeLower]) {
                const trad = I18N_CACHE_LOWER[completeLower][targetLang];
                if (trad) return trad;
            }
            
            // Sinon, découper en mots et chercher les plus longues correspondances
            const mots = pathologie.trim().split(/\s+/);
            const result = [];
            let i = 0;
            
            while (i < mots.length) {
                let matched = false;
                
                // Essayer des expressions de plus en plus courtes à partir de la position i
                for (let len = mots.length - i; len > 0; len--) {
                    const expression = mots.slice(i, i + len).join(' ');
                    const expressionLower = expression.toLowerCase();
                    
                    if (I18N_CACHE_LOWER[expressionLower]) {
                        const trad = I18N_CACHE_LOWER[expressionLower][targetLang];
                        if (trad) {
                            result.push(trad);
                            i += len;
                            matched = true;
                            break;
                        }
                    }
                }
                
                // Si aucune correspondance, garder le mot original
                if (!matched) {
                    result.push(mots[i]);
                    i++;
                }
            }
            
            return result.join(' ');
        }

        function isMatchingCriteria(text) {
            if (!lastSearchCriteria || lastSearchCriteria.length === 0) {

            }
            
            const textLower = text.toLowerCase().trim();
            
            for (const critere of lastSearchCriteria) {

                // Vérifier le label

        // ║ PARSE EXAMPLES v1.0.0 - Parse les exemples depuis localStorage
        // ║ webparams.html sauvegarde en texte brut (1 exemple par ligne)
        // ╚═══════════════════════════════════════════════════════════════
        function parseExamples(rawValue) {
            if (!rawValue) return DEFAULT_EXAMPLES;
            
            // Essayer d'abord JSON (ancien format possible)
            try {
                const parsed = JSON.parse(rawValue);
                if (Array.isArray(parsed) && parsed.length > 0) {
                    return parsed;
                }
            } catch (e) {
                // Ce n'est pas du JSON, c'est du texte brut
            }
            
            // Parser comme texte brut (1 exemple par ligne)
            const lines = rawValue.split('\n')
                .map(line => line.trim())
                .filter(line => line.length > 0);
            
            return lines.length > 0 ? lines : DEFAULT_EXAMPLES;
        }

                // Mode de détection v5.0 (simplifié)
                detectionMode: localStorage.getItem('detectionMode') || 'standard',
                unionMode: localStorage.getItem('unionMode') === 'true',
                unionIA: localStorage.getItem('unionIA') || 'gpt4o',
                
                // Paramètres Actif/Bandeau (lus depuis localStorage)
                activeTheme: localStorage.getItem('activeTheme') !== 'false',

                activePagesize: localStorage.getItem('activePagesize') !== 'false',
                
                // Langue
                selectedLanguage: localStorage.getItem('selectedLanguage') || 'auto',
                responseLanguage: localStorage.getItem('responseLanguage') || 'same',
                
                // Les exemples sont sauvegardés en texte brut par webparams (1 exemple par ligne)
                examples: parseExamples(localStorage.getItem('searchExamples')),
                conversationHistory: JSON.parse(localStorage.getItem('conversationHistory') || '[]')

            // Migration anciens paramètres (rapide → standard)
            if (settings.detectionMode === 'traditionnel' || settings.detectionMode === 'rapide') {
                settings.detectionMode = 'standard';
                localStorage.setItem('detectionMode', 'standard');
            }
            
            // Appliquer le nom utilisateur à l'interface
            if (elements.welcomeUserName) {
                elements.welcomeUserName.textContent = settings.userName;
            }
            
            // Appliquer le style visuel
            applyStyle(settings.uiStyle);

        function applyBandeauStates(settings) {
            // Masquer/afficher les éléments de la toolbar selon Bandeau
            // LOGIQUE v5.2 : visible par défaut, masqué seulement si explicitement false
            const baseSelector = document.getElementById('baseSelector');
            const langButton = document.getElementById('langButton');
            const themeToggle = document.getElementById('themeToggle');
            
            // Sélecteur de base dans toolbar - visible sauf si bandeauBases === false
            if (baseSelector) {
                const bandeauBases = localStorage.getItem('bandeauBases');
                baseSelector.style.display = (bandeauBases === 'false') ? 'none' : '';
            }
            
            // Bouton langue - visible sauf si bandeauI18n === false ET activeI18n
            if (langButton) {
                const langContainer = langButton.closest('.lang-button-container');
                const bandeauI18n = localStorage.getItem('bandeauI18n');
                if (langContainer) {
                    langContainer.style.display = (bandeauI18n === 'false' || !settings.activeI18n) ? 'none' : '';
                }
            }
            
            // Bouton thème (jour/nuit) - visible si bandeauTheme === 'true'
            if (themeToggle) {
                themeToggle.style.display = settings.bandeauTheme ? '' : 'none';
            }
        }
        
        // Nouvelle fonction v5.0 : Appliquer visibilité panel gauche
        function applyPanelVisibility(settings) {
            const sidebar = document.querySelector('.sidebar');
            const recentSection = document.getElementById('recentConversations')?.closest('.sidebar-section');
            const examplesSection = document.getElementById('examplesList')?.closest('.sidebar-section');
            
            if (!settings.activePanel && sidebar) {
                // Utiliser collapsed pour que le CSS .sidebar.collapsed ~ .content fonctionne
                sidebar.classList.add('collapsed');
                sidebar.style.display = 'none'; // Masquer complètement
            } else if (sidebar) {
                sidebar.classList.remove('collapsed');
                sidebar.style.display = '';
                if (recentSection) recentSection.style.display = settings.activeHistorique ? '' : 'none';
                if (examplesSection) examplesSection.style.display = settings.activeExemples ? '' : 'none';

        function saveConversationHistory() {
            try {
                // Limiter la taille : ne garder que les 50 dernières conversations
                // et ne pas stocker les patients (trop volumineux)
                const historyToSave = conversationHistory.slice(-50).map(item => ({
                    query: item.query,
                    timestamp: item.timestamp,
                    elapsedTime: item.elapsedTime,
                    endpoint: item.endpoint,
                    lang: item.lang,
                    response: {
                        nb_patients: item.response.nb_patients,
                        nb_patients_retournes: item.response.nb_patients_retournes,
                        description_filtres: item.response.description_filtres,
                        // Ne PAS stocker patients[] pour éviter le quota exceeded
                        patients: [] // Sera rechargé si nécessaire
                    }
                }));
                localStorage.setItem('conversationHistory', JSON.stringify(historyToSave));
            } catch (e) {
                // Si quota exceeded, vider l'historique localStorage et continuer
                console.warn('localStorage quota exceeded, clearing history', e);
                try {
                    localStorage.removeItem('conversationHistory');
                } catch (e2) {
                    console.error('Cannot clear localStorage', e2);
                }
            }
        }

        /**
         * Formate le message de résultat dans la langue appropriée
         * @param {number} count - Nombre de patients
         * @param {string} criteria - Description des critères
         * @param {number} time - Temps en ms
         * @param {string} langEffective - Langue effective (détectée ou sélectionnée)
         * @returns {string} Message formaté
         */
        function formatResultMessage(count, criteria, time, langEffective) {
            // Si réponse en français forcée, utiliser français
            const lang = (responseLanguage === 'fr') ? 'fr' : (langEffective || 'fr');
            lastSearchLang = lang; // Mémoriser pour la pagination
            const msg = MESSAGES_RESULTATS[lang] || MESSAGES_RESULTATS['fr'];
            
            if (count === 0) {
                return msg.aucun;
            }
            
            const patientWord = count === 1 ? msg.patient : msg.patients;
            const foundWord = count === 1 ? msg.trouve : msg.trouves;
            
            return `${count} ${patientWord} ${foundWord} ${msg.avec} ${criteria} (${time}ms)`;
        }
        
        /**
         * Formate le message de pagination dans la langue appropriée
         * @param {number} displayed - Nombre affiché

         * @param {string} criteria - Description des critères
         * @param {string} langEffective - Langue effective
         * @param {boolean} isAll - Si tous les patients sont affichés
         * @returns {string} Message formaté
         */
        function formatPaginationMessage(displayed, total, criteria, langEffective, isAll = false) {
            const lang = (responseLanguage === 'fr') ? 'fr' : (langEffective || lastSearchLang || 'fr');
            const msg = MESSAGES_RESULTATS[lang] || MESSAGES_RESULTATS['fr'];
            
            if (isAll) {
                return `${displayed} ${msg.patients} ${msg.affiches} ${msg.avec} ${criteria} (${msg.tous})`;
            }
            return `${displayed} / ${total} ${msg.patients} ${msg.affiches} ${msg.avec} ${criteria}`;
        }

        function createLangInfoMessage(langDetectee, langSelectionnee) {

            if (!langDetectee) {
                return null;

            // Pas de message si la langue détectée est le français (cas normal, rien à signaler)
            if (langDetectee === 'fr') {

            // - 'same' = réponses dans la langue d'origine
            const answerText = (responseLanguage === 'fr')

        // ║ Génération des CHIPS de langue v1.1.0
        // ║ Charge les langues actives depuis /params?param=languesactives
        // ║ Auto en premier, rouge et gras, par défaut
        // ║ 3 langues par ligne
        // ╚═══════════════════════════════════════════════════════════════
        
        let languesActives = ['fr', 'en', 'de', 'es', 'it', 'pt', 'pl', 'ro', 'th', 'ar', 'cn', 'ja']; // Fallback
        
        async function loadActiveLanguages() {
            try {
                const response = await fetch(`${API_BASE_URL}/params?param=languesactives`);
                if (response.ok) {
                    const data = await response.json();
                    if (data.languesactives && data.languesactives.length > 0) {
                        languesActives = data.languesactives;
                        addDebugLog(`Langues actives chargées: ${languesActives.join(', ')}`, 'success');
                    }
                }
            } catch (error) {
                addDebugLog(`Erreur chargement langues actives: ${error.message}`, 'error');
            }
        }
        
        function generateLangChips() {
            if (!elements.chipsContainer) return;
            elements.chipsContainer.innerHTML = '';
            
            // 1. D'abord ajouter le chip Auto (rouge, gras, pleine largeur)
            const autoChip = document.createElement('div');
            autoChip.className = 'lang-chip auto-chip' + (selectedLanguage === 'auto' ? ' selected' : '');
            autoChip.dataset.lang = 'auto';
            autoChip.innerHTML = `
                <span style="font-size: 16px;">🔄</span>
                <span class="chip-name">Auto</span>
            `;
            autoChip.addEventListener('click', () => {
                setQuestionLanguage('auto');
                document.querySelectorAll('.lang-chip').forEach(c => {
                    c.classList.toggle('selected', c.dataset.lang === 'auto');
                });
            });
            elements.chipsContainer.appendChild(autoChip);
            
            // 2. Ensuite les langues actives (filtrées depuis commun.csv)
            for (const langCode of languesActives) {
                const lang = LANGUES[langCode];
                if (!lang || langCode === 'auto') continue; // Skip auto (déjà ajouté) et langues inconnues
                
                const chip = document.createElement('div');
                chip.className = 'lang-chip' + (langCode === selectedLanguage ? ' selected' : '');
                chip.dataset.lang = langCode;
                
                if (lang.flag) {
                    chip.innerHTML = `
                        <img class="chip-flag" src="${getFlagUrl(lang.flag)}" alt="${lang.code}">
                        <span class="chip-name">${lang.nom}</span>
                    `;
                } else {
                    chip.innerHTML = `
                        <span class="chip-name">${lang.nom}</span>
                    `;
                }
                
                chip.addEventListener('click', () => {
                    setQuestionLanguage(langCode);
                    document.querySelectorAll('.lang-chip').forEach(c => {
                        c.classList.toggle('selected', c.dataset.lang === langCode);
                    });
                });
                elements.chipsContainer.appendChild(chip);
            }
        }
        
        function updateLangButton() {
            if (!elements.langFlag || !elements.langText) return;
            
            const lang = LANGUES[selectedLanguage] || LANGUES['fr'];
            
            // Drapeau
            if (lang.flag) {
                elements.langFlag.src = getFlagUrl(lang.flag);
                elements.langFlag.style.display = 'block';
            } else {
                elements.langFlag.style.display = 'none';
            }
            
            // Texte selon configuration
            if (responseLanguage === 'fr' && selectedLanguage !== 'fr') {
                elements.langText.innerHTML = `${lang.code}<span class="arrow-fr">→fr</span>`;
            } else {
                elements.langText.textContent = lang.code;

        async function runSearchAnimation(skipDelays = false) {

            if (!skipDelays) {
                await new Promise(resolve => setTimeout(resolve, 2000));

            // Étape 2 : Orange - lancement du count
            setSearchStatus('connecting');
            
            try {
                const response = await fetch(`${API_BASE_URL}/count?base=${currentBase}`);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);

                const data = await response.json();

                // Attendre 2 secondes après réponse OK (sauf si skipDelays)
                if (!skipDelays) {
                    await new Promise(resolve => setTimeout(resolve, 2000));
                }
                
                // Étape 3 : Vert - succès
                setSearchStatus('ready');
                addDebugLog(`${count} patients dans ${currentBase}`, 'success');
                
            } catch (error) {
                console.error('Erreur comptage:', error);
                addDebugLog(`Erreur comptage: ${error.message}`, 'error');
                setSearchStatus('error');
                showServerError(currentBase, error.message);

        /**
         * Charge les moteurs IA depuis le serveur (/ia) et peuple les sélecteurs
         * @returns {boolean} true si succès
         */
        async function loadIAModels() {
            try {
                const response = await fetch(`${API_BASE_URL}/ia`);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                const moteursRaw = data.moteurs || [];
                
                // Filtrer uniquement les moteurs actifs (actif='O')
                const moteurs = moteursRaw.filter(m => m.actif === 'O');
                
                console.log(`[IA] ${moteursRaw.length} moteurs chargés, ${moteurs.length} actifs`);
                
                if (moteurs.length === 0) {
                    console.warn('[IA] Aucun moteur IA actif');
                    // Fallback : activer avec option par défaut
                    elements.detectionModeSelector.innerHTML = '<option value="standard">⚡ Standard</option>';
                    elements.detectionModeSelector.disabled = false;
                    return false;
                }
                
                // Construire le cache
                IA_MODELS_CACHE = {};
                moteurs.forEach(m => {
                    IA_MODELS_CACHE[m.moteur] = {
                        notes: m.notes || '',
                        image: m.image || '',
                        actif: m.actif || 'N'
                    };
                });
                // v1.3.2 : Mettre à jour la référence globale
                window.IA_MODELS_CACHE = IA_MODELS_CACHE;
                
                console.log(`[IA] ${moteurs.length} moteurs chargés:`, Object.keys(IA_MODELS_CACHE));
                
                // Peupler le sélecteur principal (toolbar)
                populateIASelector(elements.detectionModeSelector, true);
                elements.detectionModeSelector.disabled = false;
                
                // Peupler le sélecteur Union (paramètres) - sans "standard"
                populateIASelector(elements.unionIASelect, false);
                
                // Restaurer la valeur sauvegardée si elle existe
                const savedMode = localStorage.getItem('detectionMode');
                if (savedMode && IA_MODELS_CACHE[savedMode]) {
                    elements.detectionModeSelector.value = savedMode;
                    detectionMode = savedMode;
                } else {
                    // Valeur par défaut : standard
                    detectionMode = 'standard';
                }
                
                const savedUnionIA = localStorage.getItem('unionIA');
                if (savedUnionIA && IA_MODELS_CACHE[savedUnionIA] && elements.unionIASelect) {
                    elements.unionIASelect.value = savedUnionIA;
                }
                
                return true;
                
            } catch (error) {
                console.error('[IA] Erreur chargement moteurs:', error);
                // Fallback : activer avec option par défaut
                elements.detectionModeSelector.innerHTML = '<option value="standard">⚡ Standard</option>';
                elements.detectionModeSelector.disabled = false;
                return false;
            }
        }
        
        /**
         * Peuple un sélecteur avec les moteurs IA
         * @param {HTMLSelectElement} selectElement - Le sélecteur à peupler
         * @param {boolean} includeStandard - Inclure le mode "standard" (sans IA)
         */
        function populateIASelector(selectElement, includeStandard = true) {
            if (!selectElement) return;
            
            selectElement.innerHTML = '';
            
            // Parcourir les moteurs dans l'ordre du cache
            Object.entries(IA_MODELS_CACHE).forEach(([moteur, info]) => {
                // Filtrer "standard" si demandé
                if (!includeStandard && moteur === 'standard') return;
                
                const option = document.createElement('option');
                option.value = moteur;
                
                // Afficher le nom avec emoji selon le type
                const isIA = moteur !== 'standard';
                const emoji = isIA ? '🤖' : '⚡';
                const displayName = info.notes || moteur;
                option.textContent = `${emoji} ${displayName}`;
                
                // Sélectionner "standard" par défaut si includeStandard
                if (includeStandard && moteur === 'standard') {
                    option.selected = true;
                }
                
                selectElement.appendChild(option);
            });
            
            // Si pas de standard et pas de sélection, sélectionner le premier
            if (!includeStandard && selectElement.options.length > 0) {
                selectElement.options[0].selected = true;
            }
        }

        // ╔════════════════════════════════════════════════════════════════
        // ║ Fonction de normalisation
        // ╚════════════════════════════════════════════════════════════════
        
        function normalizeText(text) {
            if (!text) return '';
            
            // 1. Minuscules
            let normalized = text.toLowerCase();
            
            // 2. Suppression des accents (décomposition Unicode + suppression des diacritiques)
            normalized = normalized.normalize('NFD').replace(/[\u0300-\u036f]/g, '');
            
            // 3. Remplacement des tirets et apostrophes par des espaces
            normalized = normalized.replace(/[-_'']/g, ' ');
            
            // 4. Dédoublonnage des espaces
            normalized = normalized.replace(/\s+/g, ' ').trim();
            
            return normalized;
        }

            try {
