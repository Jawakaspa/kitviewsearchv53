/**
 * Passe le filigrane à l'intensité minimale (0%) - filigrane toujours visible mais très atténué
 * Utilisé lors de l'affichage des résultats (bandeau ou liste)
 */
function hideFiligraneForResults() {
    // Arrêter toute animation en cours
    if (window.filigraneAnimationTimer) {
        clearInterval(window.filigraneAnimationTimer);
        window.filigraneAnimationTimer = null;
    }
    applyFiligraneIntensity(0);
    console.log('[Filigrane] Intensité minimale pour affichage résultats');
}

/**
 * Restaure le filigrane à sa valeur configurée (sans animation)
 */
function restoreFiligraneIntensity() {
    // Arrêter toute animation en cours
    if (window.filigraneAnimationTimer) {
        clearInterval(window.filigraneAnimationTimer);
        window.filigraneAnimationTimer = null;
    }
    applyFiligraneIntensity(filigraneIntensity);
    console.log('[Filigrane] Restauré à', filigraneIntensity + '%');
}

/**
 * Animation : part de 100% et descend vers la valeur de consigne en 10 secondes
 * Utilisé lors de "Nouvelle recherche"
 */
function animateFiligraneFromMax() {
    // Arrêter toute animation en cours
    if (window.filigraneAnimationTimer) {
        clearInterval(window.filigraneAnimationTimer);
        window.filigraneAnimationTimer = null;
    }
    
    const startIntensity = 100;
    const targetIntensity = filigraneIntensity;
    const duration = 10000; // 10 secondes
    const startTime = Date.now();
    
    // Appliquer immédiatement l'intensité maximale
    applyFiligraneIntensity(startIntensity);
    console.log('[Filigrane] Animation: 100% →', targetIntensity + '% en 10s');
    
    window.filigraneAnimationTimer = setInterval(() => {
        const elapsed = Date.now() - startTime;
        const progress = Math.min(elapsed / duration, 1);
        
        // Interpolation linéaire de 100% vers la valeur de consigne
        const currentIntensity = startIntensity - (startIntensity - targetIntensity) * progress;
        applyFiligraneIntensity(currentIntensity);
        
        if (progress >= 1) {
            clearInterval(window.filigraneAnimationTimer);
            window.filigraneAnimationTimer = null;
            console.log('[Filigrane] Animation terminée à', targetIntensity + '%');
        }
    }, 50); // 20 fps
}

/**
 * Met à jour le disque de progression du mode démo
 * @param {number} percent - Pourcentage de progression (0-100)
 */
function updateDemoProgress(percent) {
    const ring = document.getElementById('demoProgressRing');
    if (ring) {
        ring.style.setProperty('--progress', percent);
    }
    demoProgress = percent;
}

/**
 * Démarre le mode démo
 */
function startDemoMode() {
    if (demoMode) return;
    demoMode = true;
    
    const ring = document.getElementById('demoProgressRing');
    if (ring) ring.classList.add('active');
    
    console.log('[Démo] Démarrage du mode démo');
    addDebugLog('Mode démo activé', 'info');
    
    runDemoCycleA();
}

/**
 * Arrête le mode démo
 */
function stopDemoMode() {
    demoMode = false;
    demoPhase = 'idle';
    
    // Nettoyer les timers
    if (demoTimers.phase) {
        clearTimeout(demoTimers.phase);
        demoTimers.phase = null;
    }
    if (demoTimers.progress) {
        clearInterval(demoTimers.progress);
        demoTimers.progress = null;
    }
    
    const ring = document.getElementById('demoProgressRing');
    if (ring) ring.classList.remove('active');
    
    updateDemoProgress(0);
    
    console.log('[Démo] Mode démo arrêté');
    addDebugLog('Mode démo désactivé', 'info');
}

/**
 * Cycle A: Nouvelle recherche + nouveau filigrane
 */
function runDemoCycleA() {
    if (!demoMode) return;
    
    demoPhase = 'new-search';
    console.log('[Démo] Cycle A: Nouvelle recherche');
    addDebugLog('Démo: Nouvelle recherche', 'info');
    
    // Simuler un clic sur "Nouvelle recherche"
    newSearch();
    
    // Attendre t/10 secondes puis passer à B
    const waitTime = (demoDuration / 10) * 1000;
    startDemoProgressAnimation(0, 10, waitTime);
    
    demoTimers.phase = setTimeout(() => {
        runDemoCycleB();
    }, waitTime);
}

/**
 * Cycle B: Choisir et afficher un exemple
 */
function runDemoCycleB() {
    if (!demoMode) return;
    
    demoPhase = 'typing';
    console.log('[Démo] Cycle B: Affichage exemple');
    
    // Récupérer les exemples
    const examplesText = elements.examplesTextarea ? elements.examplesTextarea.value : '';
    const examples = examplesText.split('\n').map(e => e.trim()).filter(e => e.length > 0);
    
    if (examples.length === 0) {
        console.log('[Démo] Pas d\'exemples, utilisation des exemples par défaut');
        examples.push(...DEFAULT_EXAMPLES);
    }
    
    // Choisir un exemple au hasard
    const randomIndex = Math.floor(Math.random() * examples.length);
    const chosenExample = examples[randomIndex];
    
    addDebugLog(`Démo: Exemple "${chosenExample.substring(0, 30)}..."`, 'info');
    
    // Afficher dans la zone de recherche
    const activeInput = getActiveSearchInput();
    if (activeInput) {
        activeInput.value = chosenExample;
        // Déclencher l'événement input pour activer le bouton
        activeInput.dispatchEvent(new Event('input', { bubbles: true }));
    }
    
    // Attendre 2t/10 secondes puis lancer la recherche
    const waitTime = (2 * demoDuration / 10) * 1000;
    startDemoProgressAnimation(10, 30, waitTime);
    
    demoTimers.phase = setTimeout(() => {
        runDemoSearch();
    }, waitTime);
}

/**
 * Lancer la recherche et attendre les résultats
 */
function runDemoSearch() {
    if (!demoMode) return;
    
    demoPhase = 'searching';
    console.log('[Démo] Lancement recherche');
    
    const activeInput = getActiveSearchInput();
    const query = activeInput ? activeInput.value : '';
    
    if (query) {
        addDebugLog(`Démo: Recherche "${query.substring(0, 30)}..."`, 'info');
        searchPatients(query);
    }
    
    // Attendre 7t/10 secondes puis décider du prochain cycle
    const waitTime = (7 * demoDuration / 10) * 1000;
    startDemoProgressAnimation(30, 100, waitTime);
    
    demoTimers.phase = setTimeout(() => {
        decideNextDemoCycle();
    }, waitTime);
}

/**
 * Décide du prochain cycle: 2/3 → B, 1/3 → A
 */
function decideNextDemoCycle() {
    if (!demoMode) return;
    
    const random = Math.random();
    
    if (random < 0.33) {
        // 1/3: Retour en A (nouvelle recherche complète)
        console.log('[Démo] Décision: Retour en A (nouvelle recherche)');
        addDebugLog('Démo: Nouveau cycle complet', 'info');
        runDemoCycleA();
    } else {
        // 2/3: Retour en B (juste effacer et nouvel exemple)
        console.log('[Démo] Décision: Retour en B (nouvel exemple)');
        addDebugLog('Démo: Nouvel exemple', 'info');
        
        // Effacer la zone de recherche sans faire "nouvelle recherche"
        const activeInput = getActiveSearchInput();
        if (activeInput) {
            activeInput.value = '';
            activeInput.dispatchEvent(new Event('input', { bubbles: true }));
        }
        
        // Restaurer le filigrane car on commence une nouvelle saisie
        restoreFiligraneIntensity();
        
        runDemoCycleB();
    }
}

/**
 * Anime la progression du disque
 */
function startDemoProgressAnimation(startPercent, endPercent, duration) {
    if (demoTimers.progress) {
        clearInterval(demoTimers.progress);
    }
    
    const startTime = Date.now();
    updateDemoProgress(startPercent);
    
    demoTimers.progress = setInterval(() => {
        const elapsed = Date.now() - startTime;
        const progress = Math.min(elapsed / duration, 1);
        const currentPercent = startPercent + (endPercent - startPercent) * progress;
        updateDemoProgress(currentPercent);
        
        if (progress >= 1) {
            clearInterval(demoTimers.progress);
            demoTimers.progress = null;
        }
    }, 50);
}

/**
 * Retourne l'input de recherche actif selon le mode
 */
function getActiveSearchInput() {
    if (elements.welcomeContainer && elements.welcomeContainer.style.display !== 'none') {
        return elements.searchInputCenter;
    } else if (currentMode === 'classique') {
        return elements.searchInputTop;
    } else {
        return elements.searchInputBottom;
    }
}

        async function loadI18n() {

                console.log(`[i18n] Chargé: ${Object.keys(I18N_CACHE).length} textes UI`);
                return true;
            } catch (error) {
                console.warn('[i18n] Erreur de chargement, fallback français:', error.message);
                I18N_CACHE = {};
                I18N_CACHE_LOWER = {};
                I18N_LOADED = false;
                return false;
            }
        }
        
        /**
         * Retourne le texte traduit pour une clé donnée
         * @param {string} cle - Clé française du texte
         * @param {string} lang - Langue cible (optionnel, utilise currentUILang par défaut)
         * @returns {string} Texte traduit ou clé française en fallback
         */
        function t(cle, lang = null) {
            if (!cle) return cle;
            
            const targetLang = lang || currentUILang || 'fr';
            
            // Recherche exacte d'abord
            if (I18N_CACHE[cle]) {
                return I18N_CACHE[cle][targetLang] || I18N_CACHE[cle]['fr'] || cle;
            }
            
            // Recherche insensible à la casse
            const cleLower = cle.toLowerCase().trim();
            if (I18N_CACHE_LOWER[cleLower]) {
                return I18N_CACHE_LOWER[cleLower][targetLang] || I18N_CACHE_LOWER[cleLower]['fr'] || cle;
            }
            
            // Fallback: retourner la clé telle quelle
            return cle;
        }
        
        /**
         * Traduit une pathologie composée (ex: "Bruxisme Nocturne Sévère") 
         * Les pathologies sont des combinaisons tag + adjectifs.
         * Utilise un algorithme glouton pour trouver les plus longues correspondances.
         * Ex: "Dentition Permanente" = tag composé (2 mots) → traduit en bloc
         * Ex: "Bruxisme Nocturne Sévère" = tag + 2 adjectifs → traduits séparément
         * @param {string} pathologie - Pathologie complète en français
         * @param {string} lang - Langue cible (optionnel)
         * @returns {string} Pathologie traduite
         */
        function tPatho(pathologie, lang = null) {
            if (!pathologie) return pathologie;
            
            const targetLang = lang || currentUILang || 'fr';
            
            // Si langue française, pas besoin de traduire
            if (targetLang === 'fr') return pathologie;
            
            // Essayer d'abord de traduire l'expression complète
            const completeLower = pathologie.toLowerCase().trim();
            if (I18N_CACHE_LOWER[completeLower]) {
                const trad = I18N_CACHE_LOWER[completeLower][targetLang];
                if (trad) return trad;
            }
            
            // Sinon, découper en mots et chercher les plus longues correspondances
            const mots = pathologie.trim().split(/\s+/);
            const result = [];
            let i = 0;
            
            while (i < mots.length) {
                let matched = false;
                
                // Essayer des expressions de plus en plus courtes à partir de la position i
                for (let len = mots.length - i; len > 0; len--) {
                    const expression = mots.slice(i, i + len).join(' ');
                    const expressionLower = expression.toLowerCase();
                    
                    if (I18N_CACHE_LOWER[expressionLower]) {
                        const trad = I18N_CACHE_LOWER[expressionLower][targetLang];
                        if (trad) {
                            result.push(trad);
                            i += len;
                            matched = true;
                            break;
                        }
                    }
                }
                
                // Si aucune correspondance, garder le mot original
                if (!matched) {
                    result.push(mots[i]);
                    i++;
                }
            }
            
            return result.join(' ');
        }

         * @param {string} text - Texte à vérifier (pathologie, tag, etc.)
         * @returns {boolean} true si le texte correspond à un critère
         */
        function isMatchingCriteria(text) {
            if (!lastSearchCriteria || lastSearchCriteria.length === 0) {
                return false;
            }
            
            const textLower = text.toLowerCase().trim();
            
            for (const critere of lastSearchCriteria) {
                // Vérifier le canonique (tag)
                if (critere.canonique && textLower.includes(critere.canonique.toLowerCase())) {
                    return true;
                }
                // Vérifier le label
                if (critere.label && textLower.includes(critere.label.toLowerCase())) {
                    return true;
                }
                // Vérifier les adjectifs
                if (critere.adjectifs && Array.isArray(critere.adjectifs)) {
                    for (const adj of critere.adjectifs) {
                        const adjText = (typeof adj === 'object') ? adj.canonique : adj;
                        if (adjText && textLower.includes(adjText.toLowerCase())) {
                            return true;
                        }
                    }
                }
            }
            
            return false;
        }

            'en': { detected: 'Language detected', answersIn: 'Answers in French', answersInOriginal: 'Answers in original language' },
            'de': { detected: 'Erkannte Sprache', answersIn: 'Antworten auf Französisch', answersInOriginal: 'Antworten in Originalsprache' },

        /**
         * Crée un message d'information sur la langue de recherche
         * @param {string} langDetectee - Langue détectée par le backend
         * @param {string} langSelectionnee - Langue sélectionnée par l'utilisateur
         * @returns {HTMLElement|null} Élément HTML ou null si pas de message
         */
        function createLangInfoMessage(langDetectee, langSelectionnee) {
            // Pas de message si langDetectee est null/undefined
            if (!langDetectee) {
                return null;
            }
            
            // Pas de message si la langue détectée est le français (cas normal, rien à signaler)
            if (langDetectee === 'fr') {
                return null;
            }
            
            const msg = MESSAGES_LANG_INFO[langDetectee] || MESSAGES_LANG_INFO['fr'];
            const langName = LANGUES[langDetectee]?.nom || langDetectee.toUpperCase();
            
            // Choisir le texte selon responseLanguage
            // - 'fr' = réponses forcées en français
            // - 'same' = réponses dans la langue d'origine
            const answerText = (responseLanguage === 'fr') 
                ? (msg.answersIn || 'Answers in French')
                : (msg.answersInOriginal || 'Answers in original language');
            
            const infoDiv = document.createElement('div');
            infoDiv.style.cssText = `
                background: linear-gradient(135deg, rgba(59, 157, 216, 0.1), rgba(59, 157, 216, 0.05));
                border: 1px solid rgba(59, 157, 216, 0.3);
                border-radius: 8px;
                padding: 8px 12px;
                margin-bottom: 10px;
                font-size: 13px;
                color: var(--text-secondary);
                display: flex;
                align-items: center;
                gap: 8px;
            `;
            
            infoDiv.innerHTML = `
                <span style="font-size: 16px;">🌐</span>
                <span>${msg.detected}: <strong>${langName}</strong> — ${answerText}</span>
            `;
            
            return infoDiv;
        }
        
        function getFlagUrl(countryCode, size = 'w40') {
            if (!countryCode) return null;
            return `https://flagcdn.com/${size}/${countryCode}.png`;
        }

        let languesActives = ['fr', 'en', 'de', 'es', 'it', 'pt', 'pl', 'ro', 'th', 'ar', 'cn', 'ja']; // Fallback

            try {

                if (response.ok) {

                    if (data.languesactives && data.languesactives.length > 0) {

        function generateLangChips() {
            if (!elements.chipsContainer) return;
            elements.chipsContainer.innerHTML = '';
            
            // 1. D'abord ajouter le chip Auto (rouge, gras, pleine largeur)
            const autoChip = document.createElement('div');
            autoChip.className = 'lang-chip auto-chip' + (selectedLanguage === 'auto' ? ' selected' : '');
            autoChip.dataset.lang = 'auto';
            autoChip.innerHTML = `
                <span style="font-size: 16px;">🔄</span>
                <span class="chip-name">Auto</span>
            `;
            autoChip.addEventListener('click', () => {
                setQuestionLanguage('auto');
                document.querySelectorAll('.lang-chip').forEach(c => {
                    c.classList.toggle('selected', c.dataset.lang === 'auto');
                });
            });
            elements.chipsContainer.appendChild(autoChip);
            
            // 2. Ensuite les langues actives (filtrées depuis commun.csv)
            for (const langCode of languesActives) {
                const lang = LANGUES[langCode];
                if (!lang || langCode === 'auto') continue; // Skip auto (déjà ajouté) et langues inconnues
                
                const chip = document.createElement('div');
                chip.className = 'lang-chip' + (langCode === selectedLanguage ? ' selected' : '');
                chip.dataset.lang = langCode;
                
                if (lang.flag) {
                    chip.innerHTML = `
                        <img class="chip-flag" src="${getFlagUrl(lang.flag)}" alt="${lang.code}">
                        <span class="chip-name">${lang.nom}</span>
                    `;
                } else {
                    chip.innerHTML = `
                        <span class="chip-name">${lang.nom}</span>
                    `;
                }
                
                chip.addEventListener('click', () => {
                    setQuestionLanguage(langCode);
                    document.querySelectorAll('.lang-chip').forEach(c => {
                        c.classList.toggle('selected', c.dataset.lang === langCode);
                    });
                });
                elements.chipsContainer.appendChild(chip);
            }
        }

                elements.langFlag.src = getFlagUrl(lang.flag);
                elements.langFlag.style.display = 'block';
            } else {

            // Texte selon configuration
            if (responseLanguage === 'fr' && selectedLanguage !== 'fr') {
                elements.langText.innerHTML = `${lang.code}<span class="arrow-fr">→fr</span>`;
            } else {
                elements.langText.textContent = lang.code;
            }

        function updateLangAfterResponse(langDetectee) {

             * - Drapeau : affiche la langue effective (détectée ou choisie)

            if (!elements.langFlag || !elements.langText) return;

            let flagCode = LANG_TO_FLAG[effectiveLang.toLowerCase()] || null;

                elements.langFlag.style.display = 'block';
            } else {
                elements.langFlag.style.display = 'none';
            }
            
            // Déterminer le texte du combo
            let comboText;
            if (isAuto) {
                comboText = 'Auto';
            } else {
                const lang = LANGUES[selectedLanguage];
                comboText = lang ? lang.code : selectedLanguage.toUpperCase();
            }
            
            // Ajouter →fr si sortie en français
            if (responseLanguage === 'fr' && selectedLanguage !== 'fr') {
                elements.langText.innerHTML = `${comboText}<span class="arrow-fr">→fr</span>`;
            } else {
                elements.langText.textContent = comboText;
            }
            
            addDebugLog(`Langue affichée: ${comboText} (détectée: ${langDetectee || 'N/A'})`, 'info');

                document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
                elements.themeToggle.textContent = isDark ? '☀️' : '🌙';
            } else {
                document.documentElement.setAttribute('data-theme', theme);
                elements.themeToggle.textContent = theme === 'dark' ? '☀️' : '🌙';
            }
            // FILIGRANE v1.1 : Réappliquer l'intensité selon le nouveau thème
            applyFiligraneIntensity(filigraneIntensity);

            const currentTheme = elements.themeSelect.value;
            if (currentTheme === 'auto') {
                elements.themeSelect.value = 'light';
                localStorage.setItem('theme', 'light');
                applyTheme('light');
            } else if (currentTheme === 'light') {
                elements.themeSelect.value = 'dark';
                localStorage.setItem('theme', 'dark');
                applyTheme('dark');
            } else {
                elements.themeSelect.value = 'auto';
                localStorage.setItem('theme', 'auto');
                applyTheme('auto');
            }

        function setSearchStatus(status) {

            // Enlever toutes les classes de status
            title.classList.remove('status-loading', 'status-connecting', 'status-ready', 'status-error');
            
            // Ajouter la nouvelle classe
            title.classList.add(`status-${status}`);
        }
        
        function showServerError(baseName, errorMessage) {
            // Supprimer un éventuel bandeau existant
            const existing = document.querySelector('.server-error-banner');
            if (existing) existing.remove();
            
            const banner = document.createElement('div');
            banner.className = 'server-error-banner';
            banner.innerHTML = `
                <h3>⚠️ Erreur de connexion au serveur</h3>
                <p>Base : <strong>${baseName || 'inconnue'}</strong></p>
                <p>${errorMessage}</p>
                <code>python server.py</code>
                <p style="margin-top: 10px; font-size: 12px;">Vérifiez que le serveur est lancé sur le port 8000</p>
            `;
            document.body.appendChild(banner);
            
            // Auto-suppression après 10 secondes
            setTimeout(() => {
                if (banner.parentNode) banner.remove();
            }, 10000);
        }
        
        function hideServerError() {
            const existing = document.querySelector('.server-error-banner');
            if (existing) existing.remove();
        }
        
        async function loadAvailableBases() {
            try {
                // Rouge au départ
                setSearchStatus('loading');
                addDebugLog('Tentative de connexion à l\'API...', 'info');
                
                const response = await fetch(`${API_BASE_URL}/bases`);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                const bases = data.bases || [];
                
                // Peupler le sélecteur toolbar
                elements.baseSelector.innerHTML = '';
                // Peupler aussi le sélecteur dans les paramètres
                if (elements.baseSelectorSettings) {
                    elements.baseSelectorSettings.innerHTML = '';
                }
                
                bases.forEach(base => {
                    const option = document.createElement('option');
                    option.value = base;
                    option.textContent = base;
                    // Ne plus sélectionner DEFAULT_BASE par défaut ici
                    elements.baseSelector.appendChild(option);
                    
                    // Dupliquer pour le sélecteur paramètres
                    if (elements.baseSelectorSettings) {
                        const optionSettings = option.cloneNode(true);
                        elements.baseSelectorSettings.appendChild(optionSettings);
                    }
                });
                
                if (bases.length === 0) {
                    elements.baseSelector.innerHTML = '<option value="">Aucune base disponible</option>';
                    if (elements.baseSelectorSettings) {
                        elements.baseSelectorSettings.innerHTML = '<option value="">Aucune base disponible</option>';
                    }
                    setSearchStatus('error');
                    showServerError('', 'Aucune base de données trouvée');
                } else {
                    // ═══════════════════════════════════════════════════════════════
                    // FIX v1.0.25 : Restaurer la base depuis localStorage ou URL
                    // ═══════════════════════════════════════════════════════════════
                    const urlParams = new URLSearchParams(window.location.search);
                    const baseFromUrl = urlParams.get('base');
                    const savedBase = localStorage.getItem('currentBase');
                    
                    // Priorité : URL > localStorage > DEFAULT_BASE
                    let targetBase = DEFAULT_BASE;
                    if (baseFromUrl && bases.includes(baseFromUrl)) {
                        targetBase = baseFromUrl;
                    } else if (savedBase && bases.includes(savedBase)) {
                        targetBase = savedBase;
                    }
                    
                    elements.baseSelector.value = targetBase;
                    if (elements.baseSelectorSettings) {
                        elements.baseSelectorSettings.value = targetBase;
                    }
                    currentBase = targetBase;
                    localStorage.setItem('currentBase', currentBase);
                    
                    // Vérifier si une requête arrive par URL (skip les délais d'animation)
                    const queryFromUrlForAnim = urlParams.get('q');
                    const hasUrlQuery = queryFromUrlForAnim && queryFromUrlForAnim.trim().length > 0;
                    
                    // Lancer l'animation de count (sans délais si requête URL)
                    await runSearchAnimation(hasUrlQuery);
                    addDebugLog(`${bases.length} base(s) chargée(s), active: ${currentBase}`, 'success');
                }
                
            } catch (error) {
                console.error('Erreur chargement bases:', error);
                addDebugLog(`ERREUR chargement bases: ${error.message}`, 'error');
                
                setSearchStatus('error');
                elements.baseSelector.innerHTML = '<option value="">Serveur non connecté</option>';
                if (elements.baseSelectorSettings) {
                    elements.baseSelectorSettings.innerHTML = '<option value="">Serveur non connecté</option>';
                }
                showServerError('', error.message);
            }
        }
        
        async function runSearchAnimation(skipDelays = false) {
            // Étape 1 : Rouge (déjà fait au lancement)
            setSearchStatus('loading');
            hideServerError();
            
            // Attendre 2 secondes (sauf si skipDelays pour requête URL)
            if (!skipDelays) {
                await new Promise(resolve => setTimeout(resolve, 2000));
            }
            
            // Étape 2 : Orange - lancement du count
            setSearchStatus('connecting');
            
            try {
                const response = await fetch(`${API_BASE_URL}/count?base=${currentBase}`);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                const count = data.count || 0;
                
                // Attendre 2 secondes après réponse OK (sauf si skipDelays)
                if (!skipDelays) {
                    await new Promise(resolve => setTimeout(resolve, 2000));
                }
                
                // Étape 3 : Vert - succès
                setSearchStatus('ready');
                addDebugLog(`${count} patients dans ${currentBase}`, 'success');
                
            } catch (error) {
                console.error('Erreur comptage:', error);
                addDebugLog(`Erreur comptage: ${error.message}`, 'error');
                setSearchStatus('error');
                showServerError(currentBase, error.message);
            }
        }
        
        // Fonction pour recharger après changement de base
        async function onBaseChange(fromSettings = false) {
            // ═══════════════════════════════════════════════════════════════
            // FIX v1.0.25 : Mettre à jour currentBase EN PREMIER !
            // ═══════════════════════════════════════════════════════════════
            
            // Synchroniser les deux sélecteurs
            if (fromSettings && elements.baseSelectorSettings) {
                // Changement depuis paramètres → mettre à jour toolbar
                elements.baseSelector.value = elements.baseSelectorSettings.value;
            } else if (elements.baseSelectorSettings) {
                // Changement depuis toolbar → mettre à jour paramètres
                elements.baseSelectorSettings.value = elements.baseSelector.value;
            }
            
            // Mettre à jour currentBase IMMÉDIATEMENT
            currentBase = elements.baseSelector.value;
            localStorage.setItem('currentBase', currentBase);
            
            addDebugLog(`Base changée: ${currentBase}`, 'info');
            
            // Fermer la modale et revenir à l'accueil
            elements.settingsModal.classList.remove('active');
            newSearch();
            
            // Lancer l'animation et recharger le compteur
            await runSearchAnimation();
        }

        // ║ MOTEURS IA v1.1 : Chargement depuis ia.csv avec filtre actif

        /**
         * Charge les moteurs IA depuis le serveur (/ia) et peuple les sélecteurs
         * @returns {boolean} true si succès
         */
        async function loadIAModels() {
            try {
                const response = await fetch(`${API_BASE_URL}/ia`);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                const moteursRaw = data.moteurs || [];
                
                // Filtrer uniquement les moteurs actifs (actif='O')
                const moteurs = moteursRaw.filter(m => m.actif === 'O');
                
                console.log(`[IA] ${moteursRaw.length} moteurs chargés, ${moteurs.length} actifs`);
                
                if (moteurs.length === 0) {
                    console.warn('[IA] Aucun moteur IA actif');
                    // Fallback : activer avec option par défaut
                    elements.detectionModeSelector.innerHTML = '<option value="standard">⚡ Standard</option>';
                    elements.detectionModeSelector.disabled = false;
                    return false;
                }
                
                // Construire le cache
                IA_MODELS_CACHE = {};
                moteurs.forEach(m => {
                    IA_MODELS_CACHE[m.moteur] = {
                        notes: m.notes || '',
                        image: m.image || '',
                        actif: m.actif || 'N'
                    };
                });
                
                console.log(`[IA] ${moteurs.length} moteurs chargés:`, Object.keys(IA_MODELS_CACHE));
                
                // Peupler le sélecteur principal (toolbar)
                populateIASelector(elements.detectionModeSelector, true);
                elements.detectionModeSelector.disabled = false;
                
                // Peupler le sélecteur Union (paramètres) - sans "standard"
                populateIASelector(elements.unionIASelect, false);
                
                // Restaurer la valeur sauvegardée si elle existe
                const savedMode = localStorage.getItem('detectionMode');
                if (savedMode && IA_MODELS_CACHE[savedMode]) {
                    elements.detectionModeSelector.value = savedMode;
                    detectionMode = savedMode;
                } else {
                    // Valeur par défaut : standard
                    detectionMode = 'standard';
                }
                
                const savedUnionIA = localStorage.getItem('unionIA');
                if (savedUnionIA && IA_MODELS_CACHE[savedUnionIA] && elements.unionIASelect) {
                    elements.unionIASelect.value = savedUnionIA;
                }
                
                return true;
                
            } catch (error) {
                console.error('[IA] Erreur chargement moteurs:', error);
                // Fallback : activer avec option par défaut
                elements.detectionModeSelector.innerHTML = '<option value="standard">⚡ Standard</option>';
                elements.detectionModeSelector.disabled = false;
                return false;
            }
        }
        
        /**
         * Peuple un sélecteur avec les moteurs IA
         * @param {HTMLSelectElement} selectElement - Le sélecteur à peupler
         * @param {boolean} includeStandard - Inclure le mode "standard" (sans IA)
         */
        function populateIASelector(selectElement, includeStandard = true) {
            if (!selectElement) return;
            
            selectElement.innerHTML = '';
            
            // Parcourir les moteurs dans l'ordre du cache
            Object.entries(IA_MODELS_CACHE).forEach(([moteur, info]) => {
                // Filtrer "standard" si demandé
                if (!includeStandard && moteur === 'standard') return;
                
                const option = document.createElement('option');
                option.value = moteur;
                
                // Afficher le nom avec emoji selon le type
                const isIA = moteur !== 'standard';
                const emoji = isIA ? '🤖' : '⚡';
                const displayName = info.notes || moteur;
                option.textContent = `${emoji} ${displayName}`;
                
                // Sélectionner "standard" par défaut si includeStandard
                if (includeStandard && moteur === 'standard') {
                    option.selected = true;
                }
                
                selectElement.appendChild(option);
            });
            
            // Si pas de standard et pas de sélection, sélectionner le premier
            if (!includeStandard && selectElement.options.length > 0) {
                selectElement.options[0].selected = true;
            }
        }
        
        /**
         * Met à jour le filigrane quand le moteur IA change
         */
        function onDetectionModeChange() {
            const newMode = elements.detectionModeSelector.value;
            detectionMode = newMode;
            localStorage.setItem('detectionMode', newMode);
            
            console.log(`[IA] Mode changé: ${newMode}`);
            
            // Mettre à jour le filigrane avec l'image du nouveau moteur
            updateFiligraneGhost();
        }

        // ╔════════════════════════════════════════════════════════════════
        // ║ Fonction de normalisation
        // ╚════════════════════════════════════════════════════════════════
        
        function normalizeText(text) {
            if (!text) return '';
            
            // 1. Minuscules
            let normalized = text.toLowerCase();
            
            // 2. Suppression des accents (décomposition Unicode + suppression des diacritiques)
            normalized = normalized.normalize('NFD').replace(/[\u0300-\u036f]/g, '');
            
            // 3. Remplacement des tirets et apostrophes par des espaces
            normalized = normalized.replace(/[-_'']/g, ' ');
            
            // 4. Dédoublonnage des espaces
            normalized = normalized.replace(/\s+/g, ' ').trim();
            
            return normalized;
        }

        // ╔════════════════════════════════════════════════════════════════
        // ║ Endpoint de recherche (Renaissance v1.2)
        // ║ Tout passe par /search - utilise trouve.py avec modes IA
        // ╚════════════════════════════════════════════════════════════════
        
        function getSearchEndpoint() {
            // /search utilise trouve.py avec support modes de détection
            return '/search';
        }
        
        function buildSearchPayload(query) {
            /**
             * Construit le payload pour /search (Renaissance v1.2)
             * Utilise trouve.py avec support des modes de détection IA
             * 
             * AJOUT v1.0.0 (web7): session_id pour le système de rating
             */
            // SUPPRIMÉ v1.0.0 : Clé API DeepL retirée de l'interface
            
            // Générer un nouveau session_id pour cette recherche
            currentSessionId = generateSessionId();
            
            // Déterminer le mode_detection effectif
            let effectiveMode = detectionMode;
            let mode2 = null;
            
            if (compareMode) {
                effectiveMode = 'compare';
                mode2 = detectionMode2;
            } else if (unionMode) {
                effectiveMode = 'union';
                mode2 = detectionMode2;
            }
            
            const payload = {
                question: query,
                base: currentBase,
                mode_detection: effectiveMode,
                lang: selectedLanguage,
                lang_reponse: responseLanguage,
                limit: resultsLimit,
                offset: 0,
                session_id: currentSessionId  // AJOUT v1.0.0 : Pour le rating
                // SUPPRIMÉ v1.0.0 : api_key retirée (gérée côté serveur via variable d'environnement)
            };
            
            // Ajouter le mode secondaire si compare ou union
            if (mode2) {
                payload.mode_detection_2 = mode2;
            }
            
            return payload;
        }

        // ╔════════════════════════════════════════════════════════════════
        // ║ Recherche de patients
        // ╚════════════════════════════════════════════════════════════════
        
        async function searchPatients(query) {
            if (!query || query.trim().length === 0) {
                return;
            }
            
            query = query.trim();
            
            try {
                // Masquer le welcome et afficher la bonne zone de recherche selon le mode
                elements.welcomeContainer.style.display = 'none';
                
                if (currentMode === 'ia') {
                    elements.searchContainerTop.classList.remove('active');
                    elements.searchContainerBottom.classList.add('active');
                } else {
                    elements.searchContainerBottom.classList.remove('active');
                    elements.searchContainerTop.classList.add('active');
                }
                
                elements.loading.classList.add('active');
                elements.resultsContainer.classList.remove('active');
                
                // NOUVEAU v1.0.6 : Déterminer endpoint et payload
                const endpoint = getSearchEndpoint();
                const payload = buildSearchPayload(query);
                
                addDebugLog(`Recherche: "${query}" sur ${currentBase}`, 'info');
                addDebugLog(`Endpoint: ${endpoint}`, 'info');
                addDebugLog(`Détection: ${payload.mode_detection}${payload.mode_detection_2 ? ' vs ' + payload.mode_detection_2 : ''}, Langue: ${payload.lang || 'fr (défaut)'}`, 'info');
                
                const startTime = performance.now();
                
                const response = await fetch(`${API_BASE_URL}${endpoint}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                const elapsedTime = data.temps_ms || Math.round(performance.now() - startTime);
                
                addDebugLog(`Réponse reçue en ${elapsedTime}ms: ${data.nb_patients} patients`, 'success');
                
                // ╔═══════════════════════════════════════════════════════════════
                // ║ GARDE-FOU : Vérifier si le garde-fou a bloqué la requête
                // ╚═══════════════════════════════════════════════════════════════
                if (data.gardefou === true) {
                    addDebugLog(`⚠️ Garde-fou activé: ${data.gardefou_raison}`, 'warning');
                    
                    // Créer une réponse avec le message du garde-fou
                    const gardefouResponse = {
                        query: query,
                        response: {
                            nb_patients: 0,
                            nb_patients_retournes: 0,
                            patients: [],
                            gardefou: true,
                            gardefou_message: data.gardefou_message || t('Aucun critère de recherche détecté'),
                            gardefou_suggestions: data.gardefou_suggestions || [],
                            temps_ms: elapsedTime
                        },
                        timestamp: new Date().toISOString(),
                        elapsedTime: elapsedTime
                    };
                    
                    conversationHistory.push(gardefouResponse);
                    saveConversationHistory();
                    renderGardefouMessage(gardefouResponse);
                    return;
                }
                
                // Renaissance v1.1 : Log langue détectée si disponible
                if (data.lang_detectee) {
                    addDebugLog(`Langue détectée: ${data.lang_detectee}`, 'info');
                }
                
                // v1.1.0 : Mettre à jour l'affichage de la langue après réponse
                updateLangAfterResponse(data.lang_detectee);
                
                // ╔═══════════════════════════════════════════════════════════════
                // ║ I18N v1.0 : Mettre à jour la langue UI si réponse en langue originale
                // ╚═══════════════════════════════════════════════════════════════
                if (responseLanguage === 'same' && data.lang_detectee) {
                    setUILanguage(data.lang_detectee);
                } else {
                    setUILanguage('fr');
                }
                
                // ╔═══════════════════════════════════════════════════════════════
                // ║ CRITÈRES v1.0 : Stocker les critères pour mise en gras
                // ╚═══════════════════════════════════════════════════════════════
                if (data.criteres && Array.isArray(data.criteres)) {
                    lastSearchCriteria = data.criteres;
                    addDebugLog(`Critères stockés: ${lastSearchCriteria.length}`, 'info');
                } else {
                    lastSearchCriteria = [];
                }
                
                // SUPPRIMÉ v1.0.0 : Bloc debugMode supprimé (les logs sont maintenant dans la console)
                console.log('[DEBUG] Recherche:', {
                    question: query,
                    endpoint: endpoint,
                    mode_detection: data.mode_detection || payload.mode_detection,
                    auteur: data.auteur,
                    nb_patients: data.nb_patients
                });
                
                // Ajouter à l'historique
                conversationHistory.push({
                    query: query,
                    response: data,
                    timestamp: new Date().toISOString(),
                    elapsedTime: elapsedTime,
                    endpoint: endpoint,
                    lang: payload.lang || 'fr',
                    lang_detectee: data.lang_detectee || null,  // v1.1.0 : langue détectée par le backend
                    session_id: currentSessionId  // AJOUT v1.0.0 (web7) : Pour le rating
                });
                
                saveConversationHistory();
                
                // Afficher les résultats selon le mode
                if (currentMode === 'classique') {
                    elements.resultsContainer.innerHTML = '';
                    renderResponse(conversationHistory[conversationHistory.length - 1]);
                } else {
                    renderResponse(conversationHistory[conversationHistory.length - 1]);
                }
                
                elements.loading.classList.remove('active');
                elements.resultsContainer.classList.add('active');
                
                // FILIGRANE DYNAMIQUE v1.1 : Masquer le filigrane quand résultats affichés
                hideFiligraneForResults();
                
                // Vider l'input
                elements.searchInputCenter.value = '';
                elements.searchInputBottom.value = '';
                elements.searchInputTop.value = '';
                
                // Réinitialiser l'état des boutons
                updateSearchButtonState(elements.searchInputCenter, elements.searchButtonCenter);
                updateSearchButtonState(elements.searchInputBottom, elements.searchButtonBottom);
                updateSearchButtonState(elements.searchInputTop, elements.searchButtonTop);
                
                // Mettre à jour la sidebar
                renderRecentConversations();
                
            } catch (error) {
                console.error('Erreur recherche:', error);
                addDebugLog(`ERREUR recherche: ${error.message}`, 'error');
                
                elements.loading.classList.remove('active');
                
                const errorDiv = document.createElement('div');
                errorDiv.className = 'error-message active';
                errorDiv.textContent = `Erreur lors de la recherche: ${error.message}. Vérifiez que le serveur API est démarré.`;
                elements.resultsContainer.appendChild(errorDiv);
                elements.resultsContainer.classList.add('active');
            }
        }


        // ╔════════════════════════════════════════════════════════════════
        // ║ Rendu d'un message garde-fou (aucun critère détecté)
        // ╚════════════════════════════════════════════════════════════════
        
        function renderGardefouMessage(item) {
            const responseDiv = document.createElement('div');
            responseDiv.className = 'response-item';
            
            // Question
            const queryDiv = document.createElement('div');
            queryDiv.className = 'query-text';
            queryDiv.textContent = item.query;
            responseDiv.appendChild(queryDiv);
            
            // Message d'avertissement
            const warningDiv = document.createElement('div');
            warningDiv.className = 'response-text';
            warningDiv.style.cssText = `
                background: linear-gradient(135deg, #fff3cd 0%, #ffeeba 100%);
                border: 1px solid #ffc107;
                border-radius: 12px;
                padding: 20px;
                margin-top: 10px;
            `;
            
            // Icône et titre
            const headerDiv = document.createElement('div');
            headerDiv.style.cssText = 'display: flex; align-items: center; gap: 10px; margin-bottom: 15px;';
            headerDiv.innerHTML = `
                <span style="font-size: 24px;">⚠️</span>
                <span style="font-weight: bold; font-size: 16px; color: #856404;">${t('Aucun critère de recherche détecté')}</span>
            `;
            warningDiv.appendChild(headerDiv);
            
            // Message explicatif
            const messageDiv = document.createElement('div');
            messageDiv.style.cssText = 'color: #856404; margin-bottom: 15px; line-height: 1.5;';
            messageDiv.textContent = item.response.gardefou_message || t('Votre recherche ne correspond à aucun terme reconnu.');
            warningDiv.appendChild(messageDiv);
            
            // Suggestions si disponibles
            const suggestions = item.response.gardefou_suggestions || [];
            if (suggestions.length > 0) {
                const suggestDiv = document.createElement('div');
                suggestDiv.style.cssText = 'margin-top: 10px;';
                suggestDiv.innerHTML = `<strong style="color: #856404;">${t('Suggestions')} :</strong>`;
                
                const suggestList = document.createElement('div');
                suggestList.style.cssText = 'display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px;';
                
                suggestions.forEach(sugg => {
                    const btn = document.createElement('button');
                    btn.textContent = sugg;
                    btn.style.cssText = `
                        padding: 6px 12px;
                        border-radius: 20px;
                        border: 1px solid #ffc107;
                        background: white;
                        color: #856404;
                        cursor: pointer;
                        font-size: 13px;
                        transition: all 0.2s;
                    `;
                    btn.onmouseover = () => btn.style.background = '#ffc107';
                    btn.onmouseout = () => btn.style.background = 'white';
                    btn.onclick = () => {
                        // Lancer une nouvelle recherche avec la suggestion
                        elements.questionInput.value = sugg;
                        submitQuestion();
                    };
                    suggestList.appendChild(btn);
                });
                
                suggestDiv.appendChild(suggestList);
                warningDiv.appendChild(suggestDiv);
            }
            
            responseDiv.appendChild(warningDiv);
            
            // Ajouter au conteneur
            if (currentMode === 'classique') {
                elements.resultsContainer.innerHTML = '';
                elements.resultsContainer.appendChild(responseDiv);
            } else {
                elements.chatContainer.appendChild(responseDiv);
                elements.chatContainer.scrollTop = elements.chatContainer.scrollHeight;
            }
        }


        // ╔════════════════════════════════════════════════════════════════
        // ║ Rendu d'une réponse
        // ╚════════════════════════════════════════════════════════════════
        
        function renderResponse(item) {
            const responseDiv = document.createElement('div');
            responseDiv.className = 'response-item';
            
            // Question
            const queryDiv = document.createElement('div');
            queryDiv.className = 'query-text';
            queryDiv.textContent = item.query;
            responseDiv.appendChild(queryDiv);
            
            // Réponse
            const responseTextDiv = document.createElement('div');
            responseTextDiv.className = 'response-text';
            
            const nbTotal = item.response.nb_patients || 0;
            const patients = item.response.patients || [];
            const nbRetournes = item.response.nb_patients_retournes || patients.length;
            const descFiltres = item.response.description_filtres || t('critères de recherche');
            
            // ╔═══════════════════════════════════════════════════════════════
            // ║ ILLUSTRATIONS v1.1 : Logique améliorée
            // ║ - Bandeau "0 patients" : si nbTotal === 0
            // ║ - Bandeau "X patients" + bouton Voir : si nbTotal > 0 MAIS pas de liste (mode combien)
            // ║ - Pas de bandeau : si nbTotal > 0 ET liste présente (recherche normale)
            // ╚═══════════════════════════════════════════════════════════════
            
            let patientsContainer = null;
            const isCountOnlyMode = nbTotal > 0 && patients.length === 0;
            
            if (nbTotal === 0) {
                // Bandeau "0 patients"
                const banner = illustrationsManager.createZeroBanner(descFiltres);
                responseTextDiv.appendChild(banner);
            } else if (isCountOnlyMode) {
                // Bandeau "X patients" UNIQUEMENT pour mode "combien" (pas de liste)
                // Le bouton "Voir" lance une vraie recherche
                const banner = illustrationsManager.createResultBanner(
                    nbTotal,
                    descFiltres,
                    `${item.elapsedTime} ms`,
                    () => {
                        // Extraire les critères de la question originale (enlever "combien")
                        let newQuery = item.query.replace(/combien\s*(de\s*)?(patients?\s*)?(avec|ont|ayant|présentant)?/gi, '').trim();
                        if (!newQuery) newQuery = item.query; // Fallback si rien ne reste
                        
                        // Lancer une vraie recherche avec les critères
                        addDebugLog(`Bouton Voir: recherche "${newQuery}"`, 'info');
                        
                        // Mettre la query dans le champ de recherche et lancer
                        if (currentMode === 'ia') {
                            elements.searchInputBottom.value = newQuery;
                        } else {
                            elements.searchInputTop.value = newQuery;
                        }
                        searchPatients(newQuery);
                    }
                );
                responseTextDiv.appendChild(banner);
            }
            // Si nbTotal > 0 ET patients.length > 0 : pas de bandeau, affichage direct de la liste
            
            // ╔═══════════════════════════════════════════════════════════════
            // ║ FIN ILLUSTRATIONS v1.1
            // ╚═══════════════════════════════════════════════════════════════
            
            // ╔═══════════════════════════════════════════════════════════════
            // ║ MESSAGE INFO LANGUE v1.2.0
            // ║ Affiche un message quand la langue détectée diffère de la sélection
            // ╚═══════════════════════════════════════════════════════════════
            const langInfoMsg = createLangInfoMessage(item.lang_detectee, item.lang);
            if (langInfoMsg) {
                responseTextDiv.appendChild(langInfoMsg);
            }
            
            // Header avec meta et actions (bouton Copier)
            const headerDiv = document.createElement('div');
            headerDiv.className = 'response-header';
            
            const metaDiv = document.createElement('div');
            metaDiv.className = 'response-meta';
            
            // v1.1.0 : Langue effective pour le message traduit
            const langEffective = item.lang_detectee || item.lang || 'fr';
            
            // Afficher le texte meta SEULEMENT si pas de bandeau (recherche normale avec liste)
            if (nbTotal > 0 && patients.length > 0) {
                if (nbTotal > nbRetournes) {
                    // Cas avec pagination
                    metaDiv.textContent = `${nbRetournes} / ${formatResultMessage(nbTotal, descFiltres, item.elapsedTime, langEffective)}`;
                } else {
                    metaDiv.textContent = formatResultMessage(nbTotal, descFiltres, item.elapsedTime, langEffective);
                }
            } else {
                metaDiv.style.display = 'none'; // Masqué car bandeau affiché
            }
            
            
            const actionsDiv = document.createElement('div');
            actionsDiv.className = 'response-actions';
            
            const copyBtn = document.createElement('button');
            copyBtn.className = 'action-btn';
            copyBtn.textContent = `📋 ${t('Copier')}`;
            copyBtn.onclick = () => copyResponse(item);
            actionsDiv.appendChild(copyBtn);
            
            headerDiv.appendChild(metaDiv);
            headerDiv.appendChild(actionsDiv);
            responseTextDiv.appendChild(headerDiv);
            
            // Patients
            if (nbTotal > 0 && patients.length > 0) {
                
                if (currentMode === 'ia') {
                    patientsContainer = document.createElement('div');
                    patientsContainer.className = 'patients-grid-ia';
                } else {
                    patientsContainer = document.createElement('div');
                    patientsContainer.className = 'patients-list-classique';
                }
                
                // Afficher les N premiers patients
                const patientsToShow = patients.slice(0, pageSize);
                
                patientsToShow.forEach(patient => {
                    const element = createPatientElement(patient);
                    patientsContainer.appendChild(element);
                });
                
                responseTextDiv.appendChild(patientsContainer);
                
                // Si plus de patients disponibles - PAGINATION PROGRESSIVE
                if (patients.length > pageSize || nbTotal > patients.length) {
                    const paginationDiv = document.createElement('div');
                    paginationDiv.style.textAlign = 'center';
                    paginationDiv.style.padding = '20px';
                    paginationDiv.style.display = 'flex';
                    paginationDiv.style.flexDirection = 'column';
                    paginationDiv.style.gap = '10px';
                    paginationDiv.style.alignItems = 'center';
                    
                    // Compteur affiché
                    const countDiv = document.createElement('div');
                    countDiv.style.color = 'var(--text-secondary)';
                    countDiv.style.fontSize = '14px';
                    countDiv.id = `count-${Date.now()}`;
                    
                    const displayed = pageSize;
                    const total = item.response.nb_patients;
                    // ╔═══════════════════════════════════════════════════════════════
                    // ║ MODIFICATION v1.2.0 : Message traduit
                    // ╚═══════════════════════════════════════════════════════════════
                    const descFiltres = item.response.description_filtres || t('critères');
                    const effLang = item.lang_detectee || item.lang || 'fr';
                    countDiv.textContent = formatPaginationMessage(displayed, total, descFiltres, effLang);
                    paginationDiv.appendChild(countDiv);
                    
                    // Bouton "Page suivante"
                    const nextBtn = document.createElement('button');
                    nextBtn.className = 'search-button';
                    nextBtn.style.padding = '10px 24px';
                    nextBtn.style.fontSize = '14px';
                    nextBtn.textContent = getNextPageText(effLang);
                    
                    // Variables de pagination stockées sur le bouton
                    nextBtn.dataset.query = item.query;
                    nextBtn.dataset.currentOffset = pageSize.toString();
                    nextBtn.dataset.allLoaded = 'false'; // Indique si tous les patients ont été chargés depuis SQL
                    
                    nextBtn.onclick = async function() {
                        const offset = parseInt(this.dataset.currentOffset);
                        const query = this.dataset.query;
                        const conversationItem = conversationHistory.find(c => c.query === query);
                        
                        if (!conversationItem) return;
                        
                        // Phase 1 : Afficher les patients déjà en mémoire
                        if (offset < conversationItem.response.patients.length) {
                            const nextBatch = conversationItem.response.patients.slice(offset, offset + pageSize);
                            
                            nextBatch.forEach(patient => {
                                const element = createPatientElement(patient);
                                patientsContainer.appendChild(element);
                            });
                            
                            const newOffset = offset + nextBatch.length;
                            this.dataset.currentOffset = newOffset.toString();
                            
                            // Mettre à jour le compteur
                            // Mettre à jour le compteur
                            // ╔═══════════════════════════════════════════════════════════════
                            // ║ MODIFICATION v1.2.0 : Message traduit
                            // ╚═══════════════════════════════════════════════════════════════
                            const descFiltres = conversationItem.response.description_filtres || t('critères');
                            const effLang = conversationItem.lang_detectee || conversationItem.lang || 'fr';
                            countDiv.textContent = formatPaginationMessage(newOffset, conversationItem.response.nb_patients, descFiltres, effLang);
                            
                            // Si on a affiché tous ceux en mémoire mais il en reste
                            if (newOffset >= conversationItem.response.patients.length && newOffset < conversationItem.response.nb_patients) {
                                // ╔═══════════════════════════════════════════════════════════════
                                // ║ MODIFICATION v1.2.0 : Messages traduits
                                // ╚═══════════════════════════════════════════════════════════════
                                countDiv.textContent = formatPaginationMessage(newOffset, conversationItem.response.nb_patients, descFiltres, effLang) + ' (...)';
                                this.disabled = true;
                                this.textContent = '...';
                                
                                // Phase 2 : Charger plus depuis SQL
                                try {
                                    addDebugLog(`Chargement de ${resultsLimit} patients supplémentaires depuis SQL (offset=${newOffset})`, 'info');
                                    
                                    const response = await fetch(`${API_BASE_URL}/trouve`, {
                                        method: 'POST',
                                        headers: {
                                            'Content-Type': 'application/json'
                                        },
                                        body: JSON.stringify({
                                            question: query,
                                            base: currentBase,
                                            mode: searchMode,
                                            limit: resultsLimit,
                                            offset: newOffset
                                        })
                                    });
                                    
                                    if (!response.ok) {
                                        throw new Error(`HTTP ${response.status}`);
                                    }
                                    
                                    const data = await response.json();
                                    
                                    // ╔═══════════════════════════════════════════════════════════════
                                    // ║ CORRECTION v1.0.3 : Sécuriser data.patients (peut être null)
                                    // ╚═══════════════════════════════════════════════════════════════
                                    const newPatients = data.patients || [];
                                    
                                    // Fusionner les nouveaux patients avec ceux déjà en mémoire
                                    conversationItem.response.patients = conversationItem.response.patients.concat(newPatients);
                                    
                                    // Afficher les nouveaux patients
                                    newPatients.forEach(patient => {
                                        const element = createPatientElement(patient);
                                        patientsContainer.appendChild(element);
                                    });
                                    
                                    const finalOffset = newOffset + newPatients.length;
                                    this.dataset.currentOffset = finalOffset.toString();
                                    this.disabled = false;
                                    this.textContent = getNextPageText(effLang);
                                    
                                    // Mettre à jour le compteur
                                    // ╔═══════════════════════════════════════════════════════════════
                                    // ║ MODIFICATION v1.2.0 : Message traduit
                                    // ╚═══════════════════════════════════════════════════════════════
                                    countDiv.textContent = formatPaginationMessage(finalOffset, conversationItem.response.nb_patients, descFiltres, effLang);
                                    
                                    addDebugLog(`${newPatients.length} patients supplémentaires chargés`, 'success');
                                    
                                    // Si on a tout chargé, cacher le bouton
                                    if (finalOffset >= conversationItem.response.nb_patients) {
                                        this.style.display = 'none';
                                        // ╔═══════════════════════════════════════════════════════════════
                                        // ║ MODIFICATION v1.2.0 : Message traduit (tous)
                                        // ╚═══════════════════════════════════════════════════════════════
                                        countDiv.textContent = formatPaginationMessage(finalOffset, finalOffset, descFiltres, effLang, true);
                                    }
                                    
                                } catch (error) {
                                    console.error('Erreur chargement pagination:', error);
                                    addDebugLog(`Erreur chargement: ${error.message}`, 'error');
                                    this.disabled = false;
                                    this.textContent = '↻';
                                }
                            }
                            
                            // Si on a affiché TOUS les patients
                            if (newOffset >= conversationItem.response.nb_patients) {
                                this.style.display = 'none';
                                // ╔═══════════════════════════════════════════════════════════════
                                // ║ MODIFICATION v1.2.0 : Message traduit (tous)
                                // ╚═══════════════════════════════════════════════════════════════
                                const descFiltres = conversationItem.response.description_filtres || t('critères');
                                const effLang = conversationItem.lang_detectee || conversationItem.lang || 'fr';
                                countDiv.textContent = formatPaginationMessage(newOffset, newOffset, descFiltres, effLang, true);
                            }
                            
                        }
                    };
                    
                    paginationDiv.appendChild(nextBtn);
                    responseTextDiv.appendChild(paginationDiv);
                }
                
            } else {
                // Le bandeau "0 patients" est déjà affiché plus haut via illustrationsManager
                // Pas besoin d'afficher un message supplémentaire
            }
            
            // ╔═══════════════════════════════════════════════════════════════
            // ║ ANALYSE COHORTE v1.0.0 : Bouton pour analyser la cohorte par IA
            // ║ Condition : nb_patients > 0
            // ╚═══════════════════════════════════════════════════════════════
            if (nbTotal > 0) {
                const analyzeBtn = createAnalyzeCohorteButton(item);
                responseTextDiv.appendChild(analyzeBtn);
            }
            
            // ╔═══════════════════════════════════════════════════════════════
            // ║ RATING SYSTEM v1.0.0 : Boutons de feedback
            // ╚═══════════════════════════════════════════════════════════════
            const ratingDiv = createRatingWidget(item.session_id || currentSessionId);
            responseTextDiv.appendChild(ratingDiv);

            // Ajouter la classe de mode au container
            elements.resultsContainer.classList.remove('mode-ia', 'mode-classique');
            elements.resultsContainer.classList.add(`mode-${currentMode}`);
            
            // Scroll pour que la nouvelle question soit en haut de l'affichage
